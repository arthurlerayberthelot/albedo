<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ALBEDO</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* --- THEME: Mark X.4 --- */
            --bg: #FAFAFA;
            --surface: #FFFFFF;
            --ink: #171717;
            --meta: #737373;
            --border: #E5E5E5;
            
            --accent: #2563EB; 
            --accent-dim: rgba(37, 99, 235, 0.08);
            --code-bg: #F3F4F6;
            --danger: #DC2626;
            
            --glass: rgba(250, 250, 250, 0.98);
            --font-ui: 'Inter', system-ui, sans-serif;
            --font-code: 'JetBrains Mono', monospace;
            --max-w: 680px;

            /* Pastel Palette */
            --c-red-bg: #fee2e2; --c-red-ink: #991b1b;
            --c-blue-bg: #dbeafe; --c-blue-ink: #1e3a8a;
            --c-green-bg: #d1fae5; --c-green-ink: #065f46;
            --c-yellow-bg: #fef3c7; --c-yellow-ink: #92400e;
            --c-purple-bg: #f3e8ff; --c-purple-ink: #5b21b6;
            --c-gray-bg: #f3f4f6; --c-gray-ink: #374151;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0A0A0A;
                --surface: #171717;
                --ink: #EDEDED;
                --meta: #525252;
                --border: #262626;
                --accent: #3B82F6;
                --accent-dim: rgba(59, 130, 246, 0.15);
                --code-bg: #222222;
                --glass: rgba(10, 10, 10, 0.98);

                /* Dark Mode Pastel Equivalents (Deep Tinting) */
                --c-red-bg: rgba(153, 27, 27, 0.15); --c-red-ink: #fca5a5;
                --c-blue-bg: rgba(30, 58, 138, 0.15); --c-blue-ink: #93c5fd;
                --c-green-bg: rgba(6, 95, 70, 0.15); --c-green-ink: #6ee7b7;
                --c-yellow-bg: rgba(146, 64, 14, 0.15); --c-yellow-ink: #fcd34d;
                --c-purple-bg: rgba(91, 33, 182, 0.15); --c-purple-ink: #d8b4fe;
                --c-gray-bg: rgba(55, 65, 81, 0.3); --c-gray-ink: #d1d5db;
            }
        }

        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg); color: var(--ink);
            font-family: var(--font-ui);
            margin: 0; height: 100vh;
            display: flex; flex-direction: column; overflow: hidden;
        }

        #toast {
            position: fixed; top: 24px; left: 50%; transform: translateX(-50%) translateY(-200%);
            background: var(--ink); color: var(--bg);
            font-family: var(--font-code); font-size: 11px; font-weight: 600;
            padding: 8px 16px; border-radius: 99px;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 999; pointer-events: none;
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.2);
        }
        #toast.active { transform: translateX(-50%) translateY(0); }

        header {
            flex-shrink: 0; background: var(--glass);
            border-bottom: 1px solid var(--border);
            padding: 24px 0; z-index: 50; transition: border-color 0.3s;
        }
        header.query-mode { border-bottom-color: var(--accent); }
        header.query-mode #commander { color: var(--accent); }

        .container { max-width: var(--max-w); margin: 0 auto; padding: 0 24px; position: relative; }

        #suggestion {
            position: absolute; right: 24px; top: 0;
            font-family: var(--font-code); font-size: 11px; color: var(--meta);
            background: var(--code-bg); padding: 4px 8px; border-radius: 4px;
            pointer-events: none; opacity: 0; transform: translateY(-10px);
            transition: all 0.2s ease;
        }
        #suggestion.active { opacity: 1; transform: translateY(0); }
        #suggestion b { color: var(--accent); font-weight: 600; }
        #suggestion kbd { 
            font-family: var(--font-ui); background: var(--border); 
            padding: 2px 4px; border-radius: 3px; font-size: 9px; margin-right: 6px;
        }

        #commander {
            width: 100%; border: none; background: transparent;
            font-family: var(--font-ui); font-size: 16px; color: var(--ink);
            line-height: 1.5; padding: 0; padding-right: 100px; resize: none; 
            overflow: hidden; min-height: 24px; max-height: 300px;
        }
        #commander::placeholder { color: var(--meta); opacity: 0.4; }

        main { flex-grow: 1; overflow-y: auto; padding: 40px 0 120px 0; scroll-behavior: smooth; }

        .block {
            margin-bottom: 32px; contain: content;
            animation: manifest 0.3s ease-out backwards;
            transition: background-color 0.2s, padding 0.2s, border-radius 0.2s;
        }
        @keyframes manifest { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .block.is-pinned { border-left: 2px solid var(--accent); padding-left: 14px; margin-left: -16px; }

        /* Dynamic Color System Overlay */
        .block.has-color {
            background-color: var(--b-bg); color: var(--b-ink);
            padding: 16px; border-radius: 8px; margin-left: -16px; width: calc(100% + 32px);
        }
        .block.has-color.is-pinned { border-left-color: var(--b-ink); margin-left: -16px; border-radius: 0 8px 8px 0; }
        .block.has-color .content, .block.has-color .content b, .block.has-color .md-h1, .block.has-color .md-h2 { color: var(--b-ink); }
        .block.has-color .block-header { color: var(--b-ink); opacity: 0.8; }
        .block.has-color .action-btn { color: var(--b-ink); }
        .block.has-color .token { background: color-mix(in srgb, var(--b-ink) 12%, transparent); color: var(--b-ink); }
        .block.has-color code { background: color-mix(in srgb, var(--b-ink) 8%, transparent); color: var(--b-ink); }

        .block-header {
            display: flex; justify-content: space-between; align-items: baseline;
            margin-bottom: 6px; font-family: var(--font-code); font-size: 10px; color: var(--meta);
        }

        .action-btns { display: flex; gap: 10px; align-items: center; }
        .action-btn {
            cursor: pointer; border: none; background: none; color: var(--meta);
            font-size: 14px; padding: 0; opacity: 0; transition: 0.2s;
        }
        .block:hover .action-btn { opacity: 1; }
        .action-btn:hover { color: var(--accent); }
        .action-btn.del-btn:hover { color: var(--danger); }
        .action-btn.pin-btn.active { opacity: 1; color: var(--accent); }
        .block.has-color .action-btn.pin-btn.active { color: var(--b-ink); }

        .content { font-size: 15px; line-height: 1.6; color: var(--ink); word-wrap: break-word; white-space: pre-wrap; }
        .content b { font-weight: 600; color: var(--ink); }
        .content i { font-style: italic; opacity: 0.8; }
        .content code { 
            font-family: var(--font-code); font-size: 12px; 
            background: var(--code-bg); padding: 2px 5px; border-radius: 4px; color: var(--ink);
        }
        
        .md-h1 { font-size: 18px; font-weight: 600; margin-top: 12px; letter-spacing: -0.4px; color: var(--ink); }
        .md-h2 { font-size: 16px; font-weight: 600; margin-top: 10px; color: var(--ink); }
        .md-quote { border-left: 2px solid var(--accent); padding-left: 14px; color: var(--meta); font-style: italic; margin: 4px 0; }

        .token {
            display: inline-flex; align-items: center; height: 18px; padding: 0 6px;
            background: var(--accent-dim); color: var(--accent); border-radius: 4px; margin-right: 8px;
            font-family: var(--font-code); font-size: 11px; font-weight: 500;
            transform: translateY(-1px); user-select: none;
        }
        .color-token { font-weight: 700; background: transparent !important; padding: 0; margin-right: 6px; }

        /* --- NEW: Pattern Tokens (Metadata) --- */
        .token-pattern {
            display: inline-flex; align-items: center; height: 18px; padding: 0 6px;
            background: var(--code-bg); /* Fond neutre */
            color: var(--meta); /* Texte grisé */
            border: 1px solid var(--border); /* Légère bordure pour le côté "data" */
            border-radius: 4px; margin-right: 8px;
            font-family: var(--font-code); font-size: 11px; font-weight: 500;
            transform: translateY(-1px); user-select: none;
        }
        
        /* Met en valeur la 'value' après les ':' */
        .token-pattern strong {
            color: var(--ink);
            font-weight: 600;
        }

        /* Adaptation pour le système de couleur dynamique (Pastels) */
        .block.has-color .token-pattern {
            background: transparent;
            color: var(--b-ink);
            border: 1px solid color-mix(in srgb, var(--b-ink) 25%, transparent);
        }
        .block.has-color .token-pattern strong {
            color: var(--b-ink);
        }

        .editor {
            width: 100%; font-family: var(--font-code); font-size: 13px;
            background: var(--surface); color: var(--ink); border: 1px solid var(--accent);
            padding: 12px; border-radius: 6px; resize: none; display: block;
            line-height: 1.5; outline: none;
        }

        footer {
            flex-shrink: 0; background: var(--glass); border-top: 1px solid var(--border); padding: 16px 0; z-index: 50;
        }
        .footer-row { display: flex; justify-content: space-between; align-items: center; }
        .deck-left { display: flex; align-items: center; gap: 12px; font-family: var(--font-code); font-size: 10px; color: var(--meta); }
        .brand { font-weight: 700; letter-spacing: 0.5px; color: var(--ink); }
        .base-name { text-transform: uppercase; opacity: 0.7; }
        .deck-right { display: flex; align-items: center; gap: 20px; }
        .stats { font-family: var(--font-code); font-size: 10px; color: var(--meta); font-weight: 500; text-align: right; }
        .controls { display: flex; gap: 16px; }
        .ctrl-btn {
            background: none; border: none; padding: 0;
            font-family: var(--font-ui); font-size: 11px; font-weight: 600; color: var(--ink); opacity: 0.4;
            cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px; transition: all 0.2s;
        }
        .ctrl-btn:hover { opacity: 1; }
        .ctrl-btn.danger:hover { color: var(--danger); opacity: 1; }
        #upload-trigger { display: none; }
        .void-msg { text-align: center; color: var(--meta); font-family: var(--font-code); font-size: 12px; margin-top: 80px; opacity: 0.4; }

        mark { 
            background-color: var(--c-yellow-bg); 
            color: var(--c-yellow-ink); 
            border-radius: 2px; 
            padding: 0 1px; /* Increased padding slightly; softer backgrounds need a bit more breathing room */
            font-weight: inherit; 
        }
        
        .block.has-color mark { 
            background-color: var(--b-ink); 
            color: var(--b-bg); 
        }

        /* --- WIKI MEDIA ENGINE --- */
        .wiki-img {
            display: block;
            max-width: 100%;
            max-height: 350px; /* Restrict vertical real estate */
            width: auto;
            border-radius: 6px;
            margin: 12px 0 4px 0;
            object-fit: cover;
            background-color: var(--border); /* Placeholder to prevent CLS */
            
            /* Performance & Aesthetic Constraints */
            content-visibility: auto; /* Skips rendering off-screen images */
            filter: contrast(0.95) saturate(0.85); /* Blends better with Albedo's theme */
            transition: filter 0.3s ease;
        }
        
        .wiki-img:hover {
            filter: contrast(1) saturate(1);
        }

        .block.has-color .wiki-img {
            border: 1px solid color-mix(in srgb, var(--b-ink) 15%, transparent);
        }
    </style>
</head>
<body>

    <div id="toast">Ready</div>

    <header id="header">
        <div class="container">
            <textarea id="commander" placeholder="Write or type '?' to search..." autocomplete="off" rows="1"></textarea>
            <div id="suggestion"></div>
        </div>
    </header>

    <main id="scroll-zone">
        <div class="container" id="feed"></div>
    </main>

    <footer>
        <div class="container footer-row">
            <div class="deck-left">
                <span class="brand">ALBEDO</span>
                <span class="base-name" id="base-label">PRIMARY</span>
            </div>

            <div class="deck-right">
                <div class="stats" id="stats">0 UNITS · 0 KB</div>
                <div class="controls">
                    <input type="file" id="upload-trigger" accept=".json">
                    <button class="ctrl-btn" onclick="sys.exportMD()">Md</button>
                    <button class="ctrl-btn" onclick="sys.exportJSON()">Json</button>
                    <button class="ctrl-btn" onclick="document.getElementById('upload-trigger').click()">Load</button>
                    <button class="ctrl-btn danger" onclick="sys.wipe()">Clear</button>
                </div>
            </div>
        </div>
    </footer>

    <script>
        const db = {
            name: 'albedo_db', version: 1, core: null,
            async init() {
                return new Promise((resolve, reject) => {
                    const req = indexedDB.open(this.name, this.version);
                    req.onupgradeneeded = (e) => {
                        const idb = e.target.result;
                        if (!idb.objectStoreNames.contains('blocks')) idb.createObjectStore('blocks', { keyPath: 'id' });
                        if (!idb.objectStoreNames.contains('meta')) idb.createObjectStore('meta', { keyPath: 'id' });
                    };
                    req.onsuccess = (e) => { this.core = e.target.result; resolve(); };
                    req.onerror = (e) => { console.error("IndexedDB Error", e.target.error); reject(e.target.error); };
                });
            },
            async getAll(storeName) {
                return new Promise((resolve) => {
                    const tx = this.core.transaction(storeName, 'readonly');
                    const req = tx.objectStore(storeName).getAll();
                    req.onsuccess = () => resolve(req.result);
                });
            },
            async put(storeName, item) {
                return new Promise((resolve) => {
                    const tx = this.core.transaction(storeName, 'readwrite');
                    tx.objectStore(storeName).put(item);
                    tx.oncomplete = () => resolve();
                });
            },
            async delete(storeName, id) {
                return new Promise((resolve) => {
                    const tx = this.core.transaction(storeName, 'readwrite');
                    tx.objectStore(storeName).delete(id);
                    tx.oncomplete = () => resolve();
                });
            },
            async clear(storeName) {
                return new Promise((resolve) => {
                    const tx = this.core.transaction(storeName, 'readwrite');
                    tx.objectStore(storeName).clear();
                    tx.oncomplete = () => resolve();
                });
            }
        };

        const sys = {
            state: [],
            meta: { id: 'primary', name: 'PRIMARY' },
            tagsIndex: new Set(),
            patternsIndex: new Set(),
            currentRenderOptions: {},
            activeSuggestion: null,
            validColors: ['red', 'blue', 'green', 'yellow', 'purple', 'gray'],
            validExternals: ['&dic:', '&wiki:', '&source:'],
            
            ui: {
                header: document.getElementById('header'),
                input: document.getElementById('commander'),
                feed: document.getElementById('feed'),
                stats: document.getElementById('stats'),
                baseLabel: document.getElementById('base-label'),
                toast: document.getElementById('toast'),
                suggestion: document.getElementById('suggestion')
            },

            async init() {
                try {
                    await db.init();
                    const blocks = await db.getAll('blocks');
                    const metas = await db.getAll('meta');
                    
                    this.state = blocks.sort((a, b) => b.ts - a.ts);
                    if(metas.length > 0) this.meta = metas[0];
                } catch (err) {
                    console.error("ALBEDO: Core Corruption", err);
                    this.notify("Memory Corruption Detected");
                }
                
                this.updateTagsIndex();
                this.render();
                
                const autoGrowCommander = () => {
                    this.ui.input.style.height = 'auto'; 
                    this.ui.input.style.height = (this.ui.input.scrollHeight) + "px";
                };

                // EVENT: Dynamic Input (Recherche + Autocomplétion)
                this.ui.input.addEventListener('input', (e) => {
                    autoGrowCommander();
                    
                    const val = this.ui.input.value;
                    const words = val.split(/\s+/);
                    const lastWord = words[words.length - 1];
                    this.activeSuggestion = null;

                    // Tag Autocomplete
                    if (lastWord.startsWith('#') && lastWord.length > 1) {
                        const match = Array.from(this.tagsIndex)
                            .sort()
                            .find(t => t.toLowerCase().startsWith(lastWord.toLowerCase()) && t !== lastWord);
                        
                        if (match) {
                            this.activeSuggestion = match;
                            this.ui.suggestion.innerHTML = `<kbd>TAB</kbd> <b>${match}</b>`;
                            this.ui.suggestion.classList.add('active');
                        } else {
                            this.ui.suggestion.classList.remove('active');
                        }
                    } 
                    // Color Autocomplete
                    else if (lastWord.startsWith('!') && lastWord.length > 1) {
                        const match = this.validColors
                            .map(c => '!' + c)
                            .find(c => c.startsWith(lastWord.toLowerCase()) && c !== lastWord.toLowerCase());
                            
                        if (match) {
                            this.activeSuggestion = match;
                            this.ui.suggestion.innerHTML = `<kbd>TAB</kbd> <b>${match}</b>`;
                            this.ui.suggestion.classList.add('active');
                        } else {
                            this.ui.suggestion.classList.remove('active');
                        }
                    }
                    else if (lastWord.startsWith('&') && lastWord.length > 0) {
                        const match = this.validExternals
                        .find(cmd => cmd.startsWith(lastWord.toLowerCase()) && cmd !== lastWord.toLowerCase());  
                        if (match) {
                            this.activeSuggestion = match;
                            this.ui.suggestion.innerHTML = `<kbd>TAB</kbd> <b>${match}</b>`;
                            this.ui.suggestion.classList.add('active');
                        } else {
                            this.ui.suggestion.classList.remove('active');
                        }
                    }
                    // --- NOUVEAU : Pattern Autocomplete (Création & Tri) ---
                    else if ((lastWord.startsWith('~') || val.startsWith('?~')) && lastWord.length > 0) {
                        let searchPrefix = '';
                        
                        // Détermine le contexte de saisie pour chercher la bonne clé
                        if (lastWord.startsWith('?~')) {
                            searchPrefix = '~' + lastWord.substring(2);
                        } else if (lastWord.startsWith('~')) {
                            searchPrefix = lastWord;
                        } else if (val.startsWith('?~')) {
                            searchPrefix = '~' + lastWord;
                        }

                        if (searchPrefix !== '~' && searchPrefix !== '') {
                            const match = Array.from(this.patternsIndex)
                                .sort()
                                .find(p => p.toLowerCase().startsWith(searchPrefix.toLowerCase()) && p !== searchPrefix.toLowerCase());

                            if (match) {
                                // Formate la suggestion selon qu'on est en train de créer un bloc ou de faire un tri
                                if (lastWord.startsWith('?~')) {
                                    this.activeSuggestion = '?~' + match.substring(1);
                                } else if (lastWord.startsWith('~')) {
                                    this.activeSuggestion = match + ':'; // Ajout UX : prépare le terrain pour la valeur
                                } else {
                                    this.activeSuggestion = match.substring(1);
                                }
                                
                                this.ui.suggestion.innerHTML = `<kbd>TAB</kbd> <b>${this.activeSuggestion}</b>`;
                                this.ui.suggestion.classList.add('active');
                            } else {
                                this.ui.suggestion.classList.remove('active');
                            }
                        } else {
                            this.ui.suggestion.classList.remove('active');
                        }
                    } 
                    // --- FIN NOUVEAU ---
                    else {
                        this.ui.suggestion.classList.remove('active');
                    }

                    // --- Logique de Recherche et de Tri ---
                    if (val.startsWith('?~')) {
                        this.ui.header.classList.add('query-mode');
                        const cleanStr = val.substring(2).trim(); // Enlève '?~' et les espaces
                        const parts = cleanStr.split(/\s+/);
                        
                        let direction = 'c';
                        let patternKey = '';

                        // Détection de l'ordre décroissant (ex: '?~ d date' ou '?~d date')
                        if (parts[0].toLowerCase() === 'd' && parts.length > 1) {
                            direction = 'd';
                            patternKey = parts[1];
                        } else if (parts[0]) {
                            patternKey = parts[0];
                        }

                        if (patternKey) {
                            // On s'assure que le tilde est présent pour le moteur de rendu
                            const pattern = patternKey.startsWith('~') ? patternKey : '~' + patternKey;
                            this.render({ type: 'sort', direction, pattern });
                        } else {
                            // Fallback si l'utilisateur a juste tapé '?~' sans clé
                            this.render({ type: 'search', query: val }); 
                        }
                    }
                    else if(val.startsWith('?')) {
                        // Mode recherche classique (ex: '?sort' cherchera le mot "sort")
                        this.ui.header.classList.add('query-mode');
                        this.render({ type: 'search', query: val.substring(1).trim() });
                    } else {
                        // Réinitialisation de l'affichage
                        this.ui.header.classList.remove('query-mode');
                        if(this.isFiltering) { 
                             this.render({}); 
                             this.isFiltering = false; 
                         }
                    }
                });

                this.ui.input.addEventListener('keydown', (e) => {
                    if (e.key === 'Tab' && this.activeSuggestion) {
                        e.preventDefault();
                        const words = this.ui.input.value.split(/\s+/);
                        words.pop();
                        words.push(this.activeSuggestion);
                        this.ui.input.value = words.join(' ') + ' ';
                        
                        this.activeSuggestion = null;
                        this.ui.suggestion.classList.remove('active');
                        autoGrowCommander();
                        this.ui.input.dispatchEvent(new Event('input'));
                        return;
                    }

                    if(e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault(); 
                        const val = this.ui.input.value.trim();

                        if (val.startsWith('&dic:')) {
                         // Safely remove the command prefix, no matter how long it is
                            const word = val.replace('&dic:', '').trim(); 
                            if (word) this.fetchDefinition(word);
                            this.ui.input.value = '';
                            this.ui.input.style.height = 'auto'; 
                            this.ui.suggestion.classList.remove('active');
                            this.activeSuggestion = null;
                            return; // Halt execution
                        }
                        else if (val.startsWith('&wiki:')) {
                            const subject = val.replace('&wiki:', '').trim(); 
                            if (subject) this.fetchWikiSummary(subject);
                            
                            this.ui.input.value = '';
                            this.ui.input.style.height = 'auto'; 
                            this.ui.suggestion.classList.remove('active');
                            this.activeSuggestion = null;
                            return; // Halt execution
                        }
                        else if (val.startsWith('&source:')) {
                            const query = val.replace('&source:', '').trim(); 
                            if (query) this.fetchSources(query);
                            
                            this.ui.input.value = '';
                            this.ui.input.style.height = 'auto'; 
                            this.ui.suggestion.classList.remove('active');
                            this.activeSuggestion = null;
                            return;
                        }
                        if(val && !val.startsWith('?')) {
                            this.add(val);
                            this.ui.input.value = '';
                            this.ui.input.style.height = 'auto'; 
                            this.ui.suggestion.classList.remove('active');
                            this.activeSuggestion = null;
                        }
                    } 
                    else if (e.key === 'Escape') {
                        this.ui.input.value = '';
                        this.ui.input.style.height = 'auto'; 
                        this.ui.header.classList.remove('query-mode');
                        this.ui.suggestion.classList.remove('active');
                        this.activeSuggestion = null;
                        this.render();
                    }
                });

                document.getElementById('upload-trigger').addEventListener('change', (e) => {
                    if(e.target.files.length > 0) {
                        this.loadCartridge(e.target.files[0]);
                        e.target.value = '';
                    }
                });
            },

            updateTagsIndex() {
                this.tagsIndex.clear();
                this.patternsIndex.clear(); // <--- NOUVEAU
                this.state.forEach(block => {
                    (block.tags || []).forEach(t => this.tagsIndex.add(t));
                    
                    // --- NOUVEAU : Indexation des clés de tri ---
                    (block.patterns || []).forEach(p => {
                        const key = p.split(':')[0]; // Extrait '~date' de '~date:2026'
                        this.patternsIndex.add(key);
                    });
                });
            },

            escape(str) {
                if(!str) return '';
                return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
            },

            escapeRegExp(string) {
                return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            },

            format(str, query = '') {
                let s = this.escape(str);
                
                s = s.replace(/^## (.*$)\n?/gm, '<div class="md-h2">$1</div>');
                s = s.replace(/^# (.*$)\n?/gm, '<div class="md-h1">$1</div>');
                s = s.replace(/^&gt; (.*$)\n?/gm, '<div class="md-quote">$1</div>');
                
                s = s.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>'); 
                s = s.replace(/\*(.*?)\*/g, '<i>$1</i>');
                s = s.replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" target="_blank" style="color: var(--accent); text-decoration: none;">$1</a>');
                // ... suite (Wiki Commons Engine, etc.)    
                
                // --- WIKI COMMONS ENGINE ---
                // Matches raw commons URLs and dynamically fetches the lightweight thumbnail
                const wikiRegex = /https:\/\/upload\.wikimedia\.org\/wikipedia\/commons\/([^\s"'<>]+)/gi;
                s = s.replace(wikiRegex, (match, path) => {
                    let src = match;
                    
                    // If it's not already a thumbnail, rewrite the URL to request a 640px version
                    if (!path.startsWith('thumb/')) {
                        const parts = path.split('/');
                        const filename = parts[parts.length - 1];
                        const ext = filename.split('.').pop().toLowerCase();
                        
                        // Wiki thumbnail servers append .png to svg thumbnails
                        if (['jpg', 'jpeg', 'png', 'webp'].includes(ext)) {
                            src = `https://upload.wikimedia.org/wikipedia/commons/thumb/${path}/640px-${filename}`;
                        } else if (ext === 'svg') {
                            src = `https://upload.wikimedia.org/wikipedia/commons/thumb/${path}/640px-${filename}.png`;
                        }
                    }
                    // decoding="async" prevents the main thread from blocking while parsing the image
                    return `<img src="${src}" class="wiki-img" loading="lazy" decoding="async" alt="Wiki Media">`;
                });

                s = s.replace(/`(.*?)`/g, '<code>$1</code>'); 
                
                // --- HIGHLIGHT ENGINE ---
                if (query) {
                    const safeQuery = this.escapeRegExp(query);
                    const regex = new RegExp(`(${safeQuery})(?![^<]*>)`, 'gi');
                    s = s.replace(regex, '<mark>$1</mark>');
                }
                
                return s;
            },

            parse(raw) {
                const tags = [];
                const patterns = [];
                let color = null;
                let text = raw.trim();
                
                // Advanced Syntax Engine: Extracts #tags, !colors, et ~patterns
                while (text.startsWith('#') || text.startsWith('!') || text.startsWith('~')) {
                    const spaceIdx = text.search(/\s/);
                    const token = spaceIdx === -1 ? text : text.substring(0, spaceIdx);

                    if (token.startsWith('#')) {
                        tags.push(token);
                    } else if (token.startsWith('~')) {
                        patterns.push(token); // Stockage des tags de tri
                    } else if (token.startsWith('!')) {
                        const colorAttempt = token.substring(1).toLowerCase();
                        if (this.validColors.includes(colorAttempt)) {
                            color = colorAttempt;
                        }
                    }

                    if (spaceIdx === -1) {
                        text = ''; break;
                    } else {
                        text = text.substring(spaceIdx).trimStart();
                    }
                }
                return { tags, patterns, color, text };
            },

            add(raw) {
                const data = this.parse(raw);
                const uid = Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
                
                const block = {
                    id: uid,
                    ts: Date.now(),
                    isPinned: false,
                    raw: raw,
                    color: data.color,
                    tags: data.tags,
                    patterns: data.patterns,
                    body: data.text
                };

                this.state.unshift(block);
                this.updateTagsIndex();
                this.render();
                db.put('blocks', block);
            },

            update(id, newRaw) {
                const idx = this.state.findIndex(x => x.id === id);
                if(idx === -1) return;

                if(!newRaw.trim()) {
                    this.remove(id);
                } else {
                    const data = this.parse(newRaw);
                    this.state[idx].raw = newRaw;
                    this.state[idx].tags = data.tags;
                    this.state[idx].patterns = data.patterns;
                    this.state[idx].color = data.color;
                    this.state[idx].body = data.text;
                    
                    this.updateTagsIndex();
                    this.render();
                    db.put('blocks', this.state[idx]);
                }
            },

            remove(id) {
                this.state = this.state.filter(x => x.id !== id);
                this.updateTagsIndex();
                this.render();
                db.delete('blocks', id);
            },
            
            togglePin(id) {
                const idx = this.state.findIndex(x => x.id === id);
                if(idx === -1) return;
                this.state[idx].isPinned = !this.state[idx].isPinned;
                this.render();
                db.put('blocks', this.state[idx]);
            },

            saveMeta() { db.put('meta', this.meta); },

            exportJSON() {
                const filename = `albedo_${this.meta.name.toLowerCase()}_${this.getDateCode()}.json`;
                this.downloadFile(JSON.stringify(this.state, null, 2), filename, 'application/json');
                this.notify("JSON Exported");
            },

            exportMD() {
                let md = `# ALBEDO EXPORT: ${this.meta.name}\n\n`;
                this.state.forEach(block => {
                    const d = new Date(block.ts);
                    const ts = d.toISOString().split('T')[0];
                    // Added defensive fallback here too
                    const metaTags = (block.tags || []).join(' ') + (block.color ? ` !${block.color}` : '');
                    md += `### ${ts} ${metaTags}\n${block.body}\n\n---\n\n`;
                });
                const filename = `albedo_${this.meta.name.toLowerCase()}.md`;
                this.downloadFile(md, filename, 'text/markdown');
                this.notify("Markdown Exported");
            },

            downloadFile(content, filename, type) {
                const blob = new Blob([content], {type: type});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = filename; a.click();
                URL.revokeObjectURL(url);
            },

            async loadCartridge(file) {
                if(this.state.length > 0 && !confirm(`UNLOAD "${this.meta.name}"?\nUnsaved data will be lost.`)) return;
                
                const reader = new FileReader();
                reader.onload = async (e) => {
                    try {
                        const json = JSON.parse(e.target.result);
                        if(!Array.isArray(json)) throw new Error("Invalid Format");
                        
                        await this.wipe(true); 
                        
                        this.state = json;
                        const baseName = file.name.replace(/\.[^/.]+$/, "").toUpperCase().replace("ALBEDO_", "");
                        this.meta.name = baseName || "IMPORTED";
                        
                        for(const block of this.state) {
                            await db.put('blocks', block);
                        }
                        this.saveMeta();
                        
                        this.updateTagsIndex();
                        this.render();
                        this.notify(`Base Loaded: ${this.meta.name}`);
                    } catch(err) { alert("Corrupt Cartridge"); }
                };
                reader.readAsText(file);
            },

            async wipe(silent = false) {
                if(silent || confirm("CLEAR MEMORY?")) {
                    this.state = [];
                    this.meta.name = "PRIMARY";
                    
                    await db.clear('blocks');
                    this.saveMeta();
                    
                    this.updateTagsIndex();
                    this.render();
                    if(!silent) this.notify("Memory Cleared");
                }
            },

            render(options = {}) {
                this.currentRenderOptions = options;

                const type = options.type || null;
                const query = options.query || '';
                const pattern = options.pattern || '';
                const direction = options.direction || 'c';

                this.isFiltering = !!type;
                let viewData = [...this.state];

                // 1. ÉTAPE DE FILTRAGE
                if (type === 'search' && query) {
                    viewData = viewData.filter(item => item.raw.toLowerCase().includes(query.toLowerCase()));
                } 
                else if (type === 'sort' && pattern) {
                    // Ne garde que les blocs ayant la clé demandée (ex: on tape "~date", on garde "~date:25-02-26")
                    viewData = viewData.filter(item => 
                        (item.patterns || []).some(p => p.startsWith(pattern + ':') || p === pattern)
                    );
                }

                // 2. ÉTAPE DE TRI
                viewData.sort((a, b) => {
                    if (type === 'sort' && pattern) {
                        // Cherche le pattern exact pour extraire sa valeur
                        const pA = (a.patterns || []).find(p => p.startsWith(pattern + ':') || p === pattern) || '';
                        const pB = (b.patterns || []).find(p => p.startsWith(pattern + ':') || p === pattern) || '';
                        
                        // Extrait la "value" après les ":"
                        const valA = pA.includes(':') ? pA.substring(pattern.length + 1) : '';
                        const valB = pB.includes(':') ? pB.substring(pattern.length + 1) : '';

                        const dirMulti = direction === 'd' ? -1 : 1;
                        
                        return dirMulti * valA.localeCompare(valB, undefined, { numeric: true, sensitivity: 'base' });
                    }

                    // Fallback (Épingles + Chronologique)
                    const aPinned = !!a.isPinned;
                    const bPinned = !!b.isPinned;
                    if (aPinned === bPinned) return b.ts - a.ts;
                    return aPinned ? -1 : 1;
                });

                this.ui.baseLabel.innerText = this.meta.name;
                
                if(viewData.length === 0) {
                    this.ui.feed.innerHTML = `<div class="void-msg">${this.isFiltering ? 'NO MATCHES' : 'THE VOID IS EMPTY'}</div>`;
                    this.updateStats();
                    return;
                }

                const fragment = document.createDocumentFragment();
                viewData.forEach(block => {
                    const el = document.createElement('div');
                    const d = new Date(block.ts);
                    const timeStr = `${d.getMonth()+1}/${d.getDate()} · ${d.getHours()}:${d.getMinutes().toString().padStart(2,'0')}`;
                    
                    const formattedBody = this.format(block.body, type === 'search' ? query : '');
                    
                    const tagsHtml = (block.tags || []).map(t => {
                        let displayTag = this.escape(t);
                        if (type === 'search' && query) {
                            const safeQ = this.escapeRegExp(query);
                            displayTag = displayTag.replace(new RegExp(`(${safeQ})`, 'gi'), '<mark>$1</mark>');
                        }
                        return `<span class="token">${displayTag}</span>`;
                    }).join('');

                    // Rendu des patterns avec séparation visuelle clé/valeur
                    const patternsHtml = (block.patterns || []).map(p => {
                        let cleanPattern = this.escape(p).replace(/^~/, ''); // Enlève le '~'
                        let displayPattern = cleanPattern;
                        
                        // Séparation de la clé et de la valeur pour un meilleur rendu
                        const colonIdx = cleanPattern.indexOf(':');
                        if (colonIdx !== -1) {
                            const key = cleanPattern.substring(0, colonIdx + 1); // ex: "date:"
                            const val = cleanPattern.substring(colonIdx + 1);    // ex: "26-02-25"
                            displayPattern = `${key}<strong>${val}</strong>`;
                        }
                        
                        // Surlignage si le tri est actif sur ce pattern
                        if (type === 'sort' && pattern && p.startsWith(pattern)) {
                             // On utilise un span au lieu de <mark> pour ne pas casser le flexbox
                             displayPattern = `<mark style="padding: 0 4px; border-radius: 2px;">${displayPattern}</mark>`;
                        }
                        
                        return `<span class="token-pattern">${displayPattern}</span>`;
                    }).join('');

                    const pinClass = block.isPinned ? ' is-pinned' : '';
                    const pinActive = block.isPinned ? ' active' : '';
                    let colorClass = block.color ? ' has-color' : '';
                    
                    el.className = `block${colorClass}${pinClass}`;
                    
                    if(block.color) {
                        el.style.setProperty('--b-bg', `var(--c-${block.color}-bg)`);
                        el.style.setProperty('--b-ink', `var(--c-${block.color}-ink)`);
                    }
                    
                    el.innerHTML = `
                        <div class="block-header">
                            <span>${timeStr}</span>
                            <div class="action-btns">
                                <button class="action-btn pin-btn${pinActive}" aria-label="Pin" onclick="sys.togglePin('${block.id}')">★</button>
                                <button class="action-btn del-btn" aria-label="Delete" onclick="sys.remove('${block.id}')">×</button>
                            </div>
                        </div>
                        <div class="content" id="b-${block.id}" onclick="sys.edit('${block.id}')">${tagsHtml}${patternsHtml}${formattedBody}</div>
                    `;
                    fragment.appendChild(el);
                });

                this.ui.feed.innerHTML = '';
                this.ui.feed.appendChild(fragment);
                this.updateStats();
            },

            edit(id) {
                const block = this.state.find(x => x.id === id);
                if(!block) return;
                
                const display = document.getElementById(`b-${id}`);
                const area = document.createElement('textarea');
                area.className = 'editor';
                area.value = block.raw;
                
                const autoGrow = () => {
                    area.style.height = 'auto';
                    area.style.height = (area.scrollHeight + 5) + "px";
                };
                setTimeout(autoGrow, 0); 
                area.addEventListener('input', autoGrow);
                
                area.onblur = () => this.update(id, area.value);
                area.onkeydown = (e) => {
                    if(e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault(); area.blur();
                    }
                };
                
                display.replaceWith(area);
                area.focus();
            },

            updateStats() {
                const count = this.state.length;
                const bytes = new Blob([JSON.stringify(this.state)]).size;
                const kb = (bytes / 1024).toFixed(2);
                this.ui.stats.innerText = `${count} UNITS · ${kb} KB`;
            },
            
            getDateCode() {
                const d = new Date();
                return `${d.getFullYear()}${(d.getMonth()+1).toString().padStart(2,'0')}${d.getDate().toString().padStart(2,'0')}`;
            },
            
            notify(msg) {
                const t = this.ui.toast;
                t.innerText = msg;
                t.classList.add('active');
                setTimeout(() => t.classList.remove('active'), 2500);
            },

            async fetchDefinition(word) {
                this.notify(`Recherche: ${word}...`);
                
                try {
                    // Fetch the clean HTML from the French Wiktionary REST API
                    const response = await fetch(`https://fr.wiktionary.org/api/rest_v1/page/html/${encodeURIComponent(word)}`);
                    
                    if (!response.ok) {
                        throw new Error("Mot introuvable");
                    }
                    
                    // Use the browser's native engine to parse the HTML string in memory
                    const html = await response.text();
                    const doc = new DOMParser().parseFromString(html, 'text/html');
                    
                    // On Wiktionary, definitions are ALWAYS stored inside ordered lists (<ol>)
                    const defLists = doc.querySelectorAll('ol');
                    if (defLists.length === 0) throw new Error("Mot introuvable");
                    
                    // Set up the ALBEDO block
                    let blockText = `#définition ~mot:${word.toLowerCase()} !purple\n\n**${word}**`;
                    
                    // Clean up the DOM node: Remove <ul> (examples) and <dl> (quotes) so the note stays atomic
                    defLists[0].querySelectorAll('ul, dl, style, sup').forEach(el => el.remove());
                    
                    // Grab the first 2 list items from the primary definition list
                    const listItems = Array.from(defLists[0].querySelectorAll(':scope > li')).slice(0, 2);
                    
                    listItems.forEach((li, index) => {
                        // textContent now safely extracts just the pure definition text
                        let text = li.textContent.replace(/\s+/g, ' ').trim();
                        if (text) blockText += `\n${index + 1}. ${text}`;
                    });
                    
                    this.add(blockText);
                    this.notify("Définition ajoutée");
                    
                } catch (err) {
                    this.notify(err.message === "Mot introuvable" ? "Mot inconnu" : "Erreur réseau");
                    console.error("ALBEDO Dico Error:", err);
                }
            },

            async fetchWikiSummary(subject) {
                this.notify(`Recherche Wiki: ${subject}...`);
                
                try {
                    // Ping the official Wikipedia REST API for the page summary
                    const response = await fetch(`https://fr.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(subject)}`);
                    
                    if (!response.ok) {
                        if (response.status === 404) throw new Error("Sujet introuvable");
                        throw new Error("Erreur réseau");
                    }
                    
                    const data = await response.json();
                    
                    // Clean up the pattern key (replace spaces with underscores for multi-word subjects like 'Révolution française')
                    const patternKey = subject.toLowerCase().replace(/\s+/g, '_');
                    
                    // Setup the ALBEDO block. data.title is the exact page name, data.extract is the plain-text summary.
                    const blockText = `#wiki ~sujet:${patternKey} !gray\n\n**${data.title}**\n${data.extract}`;
                    
                    this.add(blockText);
                    this.notify("Résumé ajouté");
                    
                } catch (err) {
                    this.notify(err.message === "Sujet introuvable" ? "Sujet inconnu" : "Erreur réseau");
                    console.error("ALBEDO Wiki Error:", err);
                }
            },

            async fetchSources(query) {
                this.notify(`Recherche sources: ${query}...`);
                
                try {
                    // Query the Crossref metadata API (limit to 3 results to keep the block atomic)
                    const response = await fetch(`https://api.crossref.org/works?query=${encodeURIComponent(query)}&select=title,author,URL,published&rows=3`);
                    
                    if (!response.ok) throw new Error("Erreur réseau");
                    
                    const data = await response.json();
                    const items = data.message.items;
                    
                    if (items.length === 0) throw new Error("Aucune source");
                    
                    // Format the pattern key (e.g., 'paris commune deaths' -> 'paris_commune_deaths')
                    const patternKey = query.toLowerCase().replace(/\s+/g, '_').substring(0, 25);
                    
                    let blockText = `#sources ~sujet:${patternKey} !yellow\n\n**Littérature académique : "${query}"**`;
                    
                    // Loop through the results and extract the messy academic JSON safely
                    items.forEach((item, index) => {
                        const title = item.title ? item.title[0] : "Titre inconnu";
                        const year = item.published ? item.published['date-parts'][0][0] : "Date inconnue";
                        
                        // Grab the first author's last name
                        const author = (item.author && item.author[0] && item.author[0].family) 
                            ? item.author[0].family 
                            : "Auteur inconnu";
                            
                        const url = item.URL || "";
                        
                        blockText += `\n\n${index + 1}. *${title}* (${year}) - ${author}.`;
                        if (url) blockText += `\n[Consulter la source](${url})`;
                    });
                    
                    this.add(blockText);
                    this.notify("Sources ajoutées");
                    
                } catch (err) {
                    this.notify(err.message === "Aucune source" ? "Rien trouvé" : "Erreur réseau");
                    console.error("ALBEDO Source Error:", err);
                }
            }
        };

        sys.init();
    </script>
</body>
</html>
