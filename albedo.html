                    const formattedBody = this.format(block.body, type === 'search' ? query : '');

                    const tagsHtml = (block.tags || []).map(t => {
                        let displayTag = this.escape(t);
                        if (type === 'search' && query) {
                            const termsToHighlight = query.split(/\s+/)
                                .filter(term => !['AND', 'OR', 'NOT'].includes(term))
                                .map(term => this.escapeRegExp(term));

                            if (termsToHighlight.length > 0) {
                                const safeQGroup = termsToHighlight.join('|');
                                displayTag = displayTag.replace(new RegExp(`(${safeQGroup})`, 'gi'), '<mark>$1</mark>');
                            }
                        }
                        return `<span class="token">${displayTag}</span>`;
                    }).join('');

                    // Rendu des patterns avec séparation visuelle clé/valeur
                    const patternsHtml = (block.patterns || []).map(p => {
                        let cleanPattern = this.escape(p).replace(/^~/, ''); // Enlève le '~'
                        let displayPattern = cleanPattern;

                        // Séparation de la clé et de la valeur pour un meilleur rendu
                        const colonIdx = cleanPattern.indexOf(':');
                        if (colonIdx !== -1) {
                            const key = cleanPattern.substring(0, colonIdx + 1); // ex: "date:"
                            const val = cleanPattern.substring(colonIdx + 1);    // ex: "26-02-25"
                            displayPattern = `${key}<strong>${val}</strong>`;
                        }

                        // Surlignage si le tri est actif sur ce pattern
                        if (type === 'sort' && pattern && p.startsWith(pattern)) {
                            // On utilise un span au lieu de <mark> pour ne pas casser le flexbox
                            displayPattern = `<mark style="padding: 0 4px; border-radius: 2px;">${displayPattern}</mark>`;
                        }

                        return `<span class="token-pattern">${displayPattern}</span>`;
                    }).join('');

                    const pinClass = block.isPinned ? ' is-pinned' : '';
                    const pinActive = block.isPinned ? ' active' : '';
                    let colorClass = block.color ? ' has-color' : '';

                    el.className = `block${colorClass}${pinClass}`;

                    if (block.color) {
                        el.style.setProperty('--b-bg', `var(--c-${block.color}-bg)`);
                        el.style.setProperty('--b-ink', `var(--c-${block.color}-ink)`);
                    }

                    el.innerHTML = `
                        <div class="block-header">
                            <span>${timeStr}</span>
                            <div class="action-btns">
                                <button class="action-btn pin-btn${pinActive}" aria-label="Pin" onclick="sys.togglePin('${block.id}')">★</button>
                                <button class="action-btn del-btn" aria-label="Delete" onclick="sys.remove('${block.id}')">×</button>
                            </div>
                        </div>
                        <div class="content" id="b-${block.id}" onclick="sys.edit('${block.id}')">${tagsHtml}${patternsHtml}${formattedBody}</div>
                    `;
                    fragment.appendChild(el);
                });

                this.ui.feed.appendChild(fragment);
                this.renderedCount += nextBatch.length;
                this.updateStats();

                if (this.renderedCount < this.currentViewData.length) {
                    if (!this.observer) this.setupObserver();
                    const lastChild = this.ui.feed.lastElementChild;
                    if (lastChild) this.observer.observe(lastChild);
                }
            },

            edit(id) {
                const block = this.state.find(x => x.id === id);
                if (!block) return;

                const display = document.getElementById(`b-${id}`);
                if (!display || display.tagName === 'TEXTAREA') return;

                const area = document.createElement('textarea');
                area.className = 'editor';
                area.value = block.raw;

                const autoGrow = () => {
                    area.style.height = 'auto';
                    area.style.height = (area.scrollHeight + 5) + "px";
                };
                setTimeout(autoGrow, 0);
                area.addEventListener('input', autoGrow);

                area.onblur = () => this.update(id, area.value);
                area.onkeydown = (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault(); area.blur();
                    }
                };

                display.replaceWith(area);
                area.focus();
            },

            updateStats() {
                const count = this.state.length;
                const bytes = new TextEncoder().encode(JSON.stringify(this.state)).length;
                const kb = (bytes / 1024).toFixed(2);
                this.ui.stats.innerText = `${count} UNITS · ${kb} KB`;
            },

            getDateCode() {
                const d = new Date();
                return `${d.getFullYear()}${(d.getMonth() + 1).toString().padStart(2, '0')}${d.getDate().toString().padStart(2, '0')}`;
            },

            modal(msg, type = 'alert', btnConfirm = 'OK', btnCancel = 'Cancel') {
                return new Promise((resolve) => {
                    const overlay = document.createElement('div');
                    overlay.style.cssText = "position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: color-mix(in srgb, var(--ink) 20%, transparent); backdrop-filter: blur(2px); display: flex; align-items: center; justify-content: center; z-index: 1000; animation: manifest 0.2s ease-out;";
                    const box = document.createElement('div');
                    box.style.cssText = "background: var(--surface); padding: 24px; border-radius: 8px; border: 1px solid var(--border); max-width: 400px; width: 90%; font-family: var(--font-ui); color: var(--ink); text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1);";

                    const text = document.createElement('div');
                    text.innerText = msg;
                    text.style.marginBottom = '24px';
                    text.style.whiteSpace = 'pre-wrap';
                    text.style.lineHeight = '1.5';

                    const actions = document.createElement('div');
                    actions.style.cssText = "display: flex; gap: 12px; justify-content: center;";

                    const btn1 = document.createElement('button');
                    btn1.innerText = btnConfirm;
                    btn1.style.cssText = "padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; background: var(--ink); color: var(--bg); font-weight: 600; font-family: var(--font-ui); font-size: 13px;";

                    btn1.onclick = () => { overlay.remove(); resolve(true); };

                    if (type === 'confirm') {
                        const btn2 = document.createElement('button');
                        btn2.innerText = btnCancel;
                        btn2.style.cssText = "padding: 8px 16px; border: 1px solid var(--border); border-radius: 4px; cursor: pointer; background: transparent; color: var(--ink); font-weight: 600; font-family: var(--font-ui); font-size: 13px;";
                        btn2.onclick = () => { overlay.remove(); resolve(false); };
                        actions.appendChild(btn2);
                    }

                    actions.appendChild(btn1);
                    box.appendChild(text);
                    box.appendChild(actions);
                    overlay.appendChild(box);
                    document.body.appendChild(overlay);
                });
            },

            notify(msg) {
                const t = this.ui.toast;
                clearTimeout(this.toastTid);
                t.innerText = msg;
                t.classList.add('active');
                this.toastTid = setTimeout(() => t.classList.remove('active'), 2500);
            }
        };

        sys.init();
    </script>
</body>

</html>
