<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 
        SECURITY NOTE: `script-src 'unsafe-inline'` in the CSP below is a deliberate
        architectural trade-off. It allows Albedo to function as a fully portable,
        zero-dependency single HTML file. For hosted, enterprise deployments, scripts 
        should be externalized and secured via strict server-generated nonces.
    -->
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; style-src 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: blob: https://upload.wikimedia.org; connect-src 'self' https://fr.wiktionary.org https://fr.wikipedia.org https://api.crossref.org https://api.github.com https://geocoding-api.open-meteo.com https://archive-api.open-meteo.com; script-src 'unsafe-inline';">
    <title>ALBEDO</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap"
        rel="stylesheet">

    <style>
        /* ========================================================================== */
        /* --- DESIGN TOKENS (Variables) ---                                          */
        /* ========================================================================== */
        :root {
            /* --- THEME: Mark X.4 --- */
            --bg: #FAFAFA;
            --surface: #FFFFFF;
            --ink: #171717;
            --meta: #737373;
            --border: #E5E5E5;

            --accent: #2563EB;
            --accent-dim: rgba(37, 99, 235, 0.08);
            --code-bg: #F3F4F6;
            --danger: #DC2626;

            --glass: rgba(250, 250, 250, 0.98);
            --font-ui: 'Inter', system-ui, sans-serif;
            --font-code: 'JetBrains Mono', monospace;
            --max-w: 680px;

            /* Pastel Palette */
            --c-red-bg: #fee2e2;
            --c-red-ink: #991b1b;
            --c-blue-bg: #dbeafe;
            --c-blue-ink: #1e3a8a;
            --c-green-bg: #d1fae5;
            --c-green-ink: #065f46;
            --c-yellow-bg: #fef3c7;
            --c-yellow-ink: #92400e;
            --c-purple-bg: #f3e8ff;
            --c-purple-ink: #5b21b6;
            --c-gray-bg: #f3f4f6;
            --c-gray-ink: #374151;
        }

        html[data-theme="dark"] {
            --bg: #0A0A0A;
            --surface: #171717;
            --ink: #EDEDED;
            --meta: #525252;
            --border: #262626;
            --accent: #3B82F6;
            --accent-dim: rgba(59, 130, 246, 0.15);
            --code-bg: #222222;
            --glass: rgba(10, 10, 10, 0.98);

            /* Dark Mode Pastel Equivalents (Deep Tinting) */
            --c-red-bg: rgba(153, 27, 27, 0.15);
            --c-red-ink: #fca5a5;
            --c-blue-bg: rgba(30, 58, 138, 0.15);
            --c-blue-ink: #93c5fd;
            --c-green-bg: rgba(6, 95, 70, 0.15);
            --c-green-ink: #6ee7b7;
            --c-yellow-bg: rgba(146, 64, 14, 0.15);
            --c-yellow-ink: #fcd34d;
            --c-purple-bg: rgba(91, 33, 182, 0.15);
            --c-purple-ink: #d8b4fe;
            --c-gray-bg: rgba(55, 65, 81, 0.3);
            --c-gray-ink: #d1d5db;
        }

        /* ========================================================================== */
        /* --- BASE & TYPOGRAPHY ---                                                  */
        /* ========================================================================== */
        * {
            box-sizing: border-box;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--ink);
            font-family: var(--font-ui);
            margin: 0;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ========================================================================== */
        /* --- OVERLAYS & NOTIFICATIONS ---                                           */
        /* ========================================================================== */
        #toast {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(-200%);
            background: var(--ink);
            color: var(--bg);
            font-family: var(--font-code);
            font-size: 11px;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 99px;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 999;
            pointer-events: none;
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.2);
        }

        #toast.active {
            transform: translateX(-50%) translateY(0);
        }

        /* ========================================================================== */
        /* --- LAYOUT (App Shell) ---                                                 */
        /* ========================================================================== */
        header {
            flex-shrink: 0;
            background: var(--glass);
            border-bottom: 1px solid var(--border);
            padding: 24px 0;
            z-index: 50;
            transition: border-color 0.3s;
        }

        header.query-mode {
            border-bottom-color: var(--accent);
        }

        header.query-mode #commander {
            color: var(--accent);
        }

        .container {
            max-width: var(--max-w);
            margin: 0 auto;
            padding: 0 24px;
            position: relative;
        }

        /* ========================================================================== */
        /* --- COMMANDER & INPUTS ---                                                 */
        /* ========================================================================== */
        #suggestion {
            position: absolute;
            right: 24px;
            top: 0;
            font-family: var(--font-code);
            font-size: 11px;
            color: var(--meta);
            background: var(--code-bg);
            padding: 4px 8px;
            border-radius: 4px;
            pointer-events: none;
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.2s ease;
        }

        #suggestion.active {
            opacity: 1;
            transform: translateY(0);
        }

        #suggestion b {
            color: var(--accent);
            font-weight: 600;
        }

        #suggestion kbd {
            font-family: var(--font-ui);
            background: var(--border);
            padding: 2px 4px;
            border-radius: 3px;
            font-size: 9px;
            margin-right: 6px;
        }

        #commander {
            width: 100%;
            border: none;
            background: transparent;
            font-family: var(--font-ui);
            font-size: 16px;
            color: var(--ink);
            line-height: 1.5;
            padding: 0;
            padding-right: 100px;
            resize: none;
            overflow: hidden;
            min-height: 24px;
            max-height: 300px;
        }

        #commander::placeholder {
            color: var(--meta);
            opacity: 0.4;
        }

        main {
            flex-grow: 1;
            overflow-y: auto;
            padding: 40px 0 120px 0;
            scroll-behavior: smooth;
        }

        /* ========================================================================== */
        /* --- COMPONENTS (Blocks) ---                                                */
        /* ========================================================================== */
        .block {
            margin-bottom: 32px;
            contain: content;
            animation: manifest 0.3s ease-out backwards;
            transition: background-color 0.2s, padding 0.2s, border-radius 0.2s;
        }

        @keyframes manifest {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .block.is-pinned {
            border-left: 2px solid var(--accent);
            padding-left: 14px;
            margin-left: -16px;
        }

        /* Dynamic Color System Overlay */
        .block.has-color {
            background-color: var(--b-bg);
            color: var(--b-ink);
            padding: 16px;
            border-radius: 8px;
            margin-left: -16px;
            width: calc(100% + 32px);
        }

        .block.has-color.is-pinned {
            border-left-color: var(--b-ink);
            margin-left: -16px;
            border-radius: 0 8px 8px 0;
        }

        .block.has-color .content,
        .block.has-color .content b,
        .block.has-color .md-h1,
        .block.has-color .md-h2 {
            color: var(--b-ink);
        }

        .block.has-color .block-header {
            color: var(--b-ink);
            opacity: 0.8;
        }

        .block.has-color .action-btn {
            color: var(--b-ink);
        }

        .block.has-color .token {
            background: color-mix(in srgb, var(--b-ink) 12%, transparent);
            color: var(--b-ink);
        }

        .block.has-color code {
            background: color-mix(in srgb, var(--b-ink) 8%, transparent);
            color: var(--b-ink);
        }

        .block-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 6px;
            font-family: var(--font-code);
            font-size: 10px;
            color: var(--meta);
        }

        .action-btns {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .action-btn {
            cursor: pointer;
            border: none;
            background: none;
            color: var(--meta);
            font-size: 14px;
            padding: 0;
            opacity: 0;
            transition: 0.2s;
        }

        .block:hover .action-btn {
            opacity: 1;
        }

        .action-btn:hover {
            color: var(--accent);
        }

        .action-btn.del-btn:hover {
            color: var(--danger);
        }

        .action-btn.pin-btn.active {
            opacity: 1;
            color: var(--accent);
        }

        .block.has-color .action-btn.pin-btn.active {
            color: var(--b-ink);
        }

        .content {
            font-size: 15px;
            line-height: 1.6;
            color: var(--ink);
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .content b {
            font-weight: 600;
            color: var(--ink);
        }

        .content i {
            font-style: italic;
            opacity: 0.8;
        }

        .content code {
            font-family: var(--font-code);
            font-size: 12px;
            background: var(--code-bg);
            padding: 2px 5px;
            border-radius: 4px;
            color: var(--ink);
        }

        .md-h1 {
            font-size: 18px;
            font-weight: 600;
            margin-top: 12px;
            letter-spacing: -0.4px;
            color: var(--ink);
        }

        .md-h2 {
            font-size: 16px;
            font-weight: 600;
            margin-top: 10px;
            color: var(--ink);
        }

        .md-quote {
            border-left: 2px solid var(--accent);
            padding-left: 14px;
            color: var(--meta);
            font-style: italic;
            margin: 4px 0;
        }

        .token {
            display: inline-flex;
            align-items: center;
            height: 18px;
            padding: 0 6px;
            background: var(--accent-dim);
            color: var(--accent);
            border-radius: 4px;
            margin-right: 8px;
            font-family: var(--font-code);
            font-size: 11px;
            font-weight: 500;
            transform: translateY(-1px);
            user-select: none;
        }

        .color-token {
            font-weight: 700;
            background: transparent !important;
            padding: 0;
            margin-right: 6px;
        }

        /* --- NEW: Pattern Tokens (Metadata) --- */
        .token-pattern {
            display: inline-flex;
            align-items: center;
            height: 18px;
            padding: 0 6px;
            background: var(--code-bg);
            /* Fond neutre */
            color: var(--meta);
            /* Texte grisé */
            border: 1px solid var(--border);
            /* Légère bordure pour le côté "data" */
            border-radius: 4px;
            margin-right: 8px;
            font-family: var(--font-code);
            font-size: 11px;
            font-weight: 500;
            transform: translateY(-1px);
            user-select: none;
        }

        /* Met en valeur la 'value' après les ':' */
        .token-pattern strong {
            color: var(--ink);
            font-weight: 600;
        }

        /* Adaptation pour le système de couleur dynamique (Pastels) */
        .block.has-color .token-pattern {
            background: transparent;
            color: var(--b-ink);
            border: 1px solid color-mix(in srgb, var(--b-ink) 25%, transparent);
        }

        .block.has-color .token-pattern strong {
            color: var(--b-ink);
        }

        .editor {
            width: 100%;
            font-family: var(--font-code);
            font-size: 13px;
            background: var(--surface);
            color: var(--ink);
            border: 1px solid var(--accent);
            padding: 12px;
            border-radius: 6px;
            resize: none;
            display: block;
            line-height: 1.5;
            outline: none;
        }

        /* ========================================================================== */
        /* --- FOOTER & CONTROLS ---                                                  */
        /* ========================================================================== */
        footer {
            flex-shrink: 0;
            background: var(--glass);
            border-top: 1px solid var(--border);
            padding: 16px 0;
            z-index: 50;
        }

        .footer-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .deck-left {
            display: flex;
            align-items: center;
            gap: 12px;
            font-family: var(--font-code);
            font-size: 10px;
            color: var(--meta);
        }

        .brand {
            font-weight: 700;
            letter-spacing: 0.5px;
            color: var(--ink);
        }

        .base-name {
            text-transform: uppercase;
            opacity: 0.7;
        }

        .deck-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .stats {
            font-family: var(--font-code);
            font-size: 10px;
            color: var(--meta);
            font-weight: 500;
            text-align: right;
        }

        .controls {
            display: flex;
            gap: 16px;
        }

        .ctrl-btn {
            background: none;
            border: none;
            padding: 0;
            font-family: var(--font-ui);
            font-size: 11px;
            font-weight: 600;
            color: var(--ink);
            opacity: 0.4;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.2s;
        }

        .ctrl-btn:hover {
            opacity: 1;
        }

        .ctrl-btn.danger:hover {
            color: var(--danger);
            opacity: 1;
        }

        #upload-trigger {
            display: none;
        }

        /* --- INDICATORS --- */
        #gist-indicator,
        #net-indicator {
            display: inline-block;
            margin-left: 8px;
            font-size: 12px;
            vertical-align: baseline;
            font-family: var(--font-code);
        }

        #gist-indicator {
            color: var(--meta);
            opacity: 0.5;
        }

        #gist-indicator::after {
            content: 'x';
        }

        .has-gist #gist-indicator {
            color: var(--ink);
            opacity: 1;
        }

        .has-gist #gist-indicator::after {
            content: 'o';
        }

        #net-indicator.is-online::after {
            content: '•';
            color: var(--c-green-ink);
        }

        #net-indicator.is-offline::after {
            content: '•';
            color: var(--danger);
        }

        /* ========================================================================== */
        /* --- UTILS & MODIFIERS ---                                                  */
        /* ========================================================================== */
        .void-msg {
            text-align: center;
            color: var(--meta);
            font-family: var(--font-code);
            font-size: 12px;
            margin-top: 80px;
            opacity: 0.4;
        }

        mark {
            background-color: var(--c-yellow-bg);
            color: var(--c-yellow-ink);
            border-radius: 2px;
            padding: 0 1px;
            /* Increased padding slightly; softer backgrounds need a bit more breathing room */
            font-weight: inherit;
        }

        .block.has-color mark {
            background-color: var(--b-ink);
            color: var(--b-bg);
        }

        /* --- WIKI MEDIA ENGINE --- */
        .wiki-img {
            display: block;
            max-width: 100%;
            max-height: 350px;
            /* Restrict vertical real estate */
            width: auto;
            border-radius: 6px;
            margin: 12px 0 4px 0;
            object-fit: cover;
            background-color: var(--border);
            /* Placeholder to prevent CLS */

            /* Performance & Aesthetic Constraints */
            content-visibility: auto;
            /* Skips rendering off-screen images */
            filter: contrast(0.95) saturate(0.85);
            /* Blends better with Albedo's theme */
            transition: filter 0.3s ease;
        }

        .wiki-img:hover {
            filter: contrast(1) saturate(1);
        }

        .block.has-color .wiki-img {
            border: 1px solid color-mix(in srgb, var(--b-ink) 15%, transparent);
        }

        /* ========================================================================== */
        /* --- RESPONSIVE (Mobile) ---                                                */
        /* ========================================================================== */
        @media (max-width: 520px) {

            /* Header: tighten vertical padding */
            header {
                padding: 14px 0;
            }

            /* Footer: two-row stack instead of single crowded row */
            .footer-row {
                flex-direction: column;
                gap: 10px;
                align-items: stretch;
            }

            /* Top row: brand + stats side by side */
            .deck-left {
                justify-content: space-between;
                width: 100%;
            }

            /* Right group becomes a column: stats above buttons */
            .deck-right {
                flex-direction: column;
                gap: 8px;
                width: 100%;
            }

            .stats {
                text-align: left;
            }

            /* Control buttons: span full width evenly */
            .controls {
                gap: 0;
                justify-content: space-between;
                width: 100%;
            }

            /* Minimum 44px touch targets (HIG / WCAG 2.5.5) */
            .ctrl-btn {
                padding: 10px 4px;
                font-size: 12px;
                min-height: 44px;
                flex: 1;
                text-align: center;
            }

            /* Block action buttons: always visible on touch
               (hover doesn't exist on touch — opacity:0 makes them unreachable) */
            .action-btn {
                opacity: 0.5;
                padding: 4px 6px;
                font-size: 16px;
            }
        }
    </style>
</head>

<body>

    <div id="toast">Ready</div>

    <header id="header">
        <div class="container">
            <textarea id="commander" placeholder="Write or type '?' to search..." autocomplete="off"
                rows="1"></textarea>
            <div id="suggestion"></div>
        </div>
    </header>

    <main id="scroll-zone">
        <div class="container" id="feed"></div>
    </main>

    <footer>
        <div class="container footer-row">
            <div class="deck-left">
                <span class="brand">ALBEDO</span>
                <span class="base-name" id="base-label">PRIMARY</span>
                <span id="gist-indicator" title="GitHub Gist Connected"></span>
                <span id="net-indicator" class="is-online" title="Network Status"></span>
            </div>

            <div class="deck-right">
                <div class="stats" id="stats">0 · 0 KB</div>
                <div class="controls">
                    <input type="file" id="upload-trigger" accept=".json">
                    <button class="ctrl-btn" onclick="sys.api.sync()">Sync</button>
                    <button class="ctrl-btn" onclick="sys.exportMD()">Md</button>
                    <button class="ctrl-btn" onclick="sys.exportJSON()">Json</button>
                    <button class="ctrl-btn" onclick="document.getElementById('upload-trigger').click()">Load</button>
                    <button class="ctrl-btn" onclick="sys.toggleTheme()" id="theme-toggle">Auto</button>
                    <button class="ctrl-btn danger" onclick="sys.wipe()">Clear</button>
                </div>
            </div>
        </div>
    </footer>

    <script>
        const db = {
            name: 'albedo_db', version: 1, core: null,
            async init() {
                return new Promise((resolve, reject) => {
                    const req = indexedDB.open(this.name, this.version);
                    req.onupgradeneeded = (e) => {
                        const idb = e.target.result;
                        if (!idb.objectStoreNames.contains('blocks')) idb.createObjectStore('blocks', { keyPath: 'id' });
                        if (!idb.objectStoreNames.contains('meta')) idb.createObjectStore('meta', { keyPath: 'id' });
                    };
                    req.onsuccess = (e) => { this.core = e.target.result; resolve(); };
                    req.onerror = (e) => { console.error("IndexedDB Error", e.target.error); reject(e.target.error); };
                });
            },
            async getAll(storeName) {
                return new Promise((resolve, reject) => {
                    const tx = this.core.transaction(storeName, 'readonly');
                    const req = tx.objectStore(storeName).getAll();
                    req.onsuccess = () => resolve(req.result);
                    req.onerror = (e) => reject(e.target.error);
                });
            },
            async put(storeName, item) {
                return new Promise((resolve, reject) => {
                    const tx = this.core.transaction(storeName, 'readwrite');
                    tx.objectStore(storeName).put(item);
                    tx.oncomplete = () => resolve();
                    tx.onerror = (e) => reject(e.target.error);
                });
            },
            async delete(storeName, id) {
                return new Promise((resolve, reject) => {
                    const tx = this.core.transaction(storeName, 'readwrite');
                    tx.objectStore(storeName).delete(id);
                    tx.oncomplete = () => resolve();
                    tx.onerror = (e) => reject(e.target.error);
                });
            },
            async clear(storeName) {
                return new Promise((resolve, reject) => {
                    const tx = this.core.transaction(storeName, 'readwrite');
                    tx.objectStore(storeName).clear();
                    tx.oncomplete = () => resolve();
                    tx.onerror = (e) => reject(e.target.error);
                });
            }
        };

        const sys = {
            state: [],
            meta: { id: 'primary', name: 'PRIMARY', theme: 'auto' },
            tagsIndex: new Set(),
            patternsIndex: new Set(),
            currentRenderOptions: {},
            viewLimit: 50,
            renderedCount: 0,
            currentViewData: [],
            observer: null,
            renderTID: null,
            activeSuggestion: null,
            validColors: ['red', 'blue', 'green', 'yellow', 'purple', 'gray'],
            validExternals: ['&dic:', '&wiki:', '&source:', '&github:', '&sync:', '&meteo:', '&help'],

            api: {
                parent: null,
                init(p) { this.parent = p; },

                generateHelp() {
                    const blockText = [
                        '#help !gray',
                        '',
                        '**ALBEDO — Aide-mémoire**',
                        '',
                        '**Écriture**',
                        '`#tag` — attribuer un tag  |  `!couleur` — colorier (red, blue, green, yellow, purple, gray)',
                        '`~clé:valeur` — ajouter un pattern  |  `**gras**`  `*italique*`  `[lien](url)`',
                        '',
                        '**Recherche & Tri**',
                        '`?mot` — recherche textuelle  |  `?#tag` — filtrer par tag  |  `?!couleur` — filtrer par couleur',
                        '`?~clé:valeur` — filtrer par pattern  |  `AND` `OR` `NOT` — opérateurs booléens',
                        '`?~ clé` — tri chronologique  |  `?~ d clé` — tri décroissant',
                        '',
                        '**Commandes externes**',
                        '`&dic: mot` — définition Wiktionnaire',
                        '`&wiki: sujet` — résumé Wikipédia',
                        '`&source: sujet` — littérature académique (Crossref)',
                        '`&meteo: Lieu YYYY-MM-DD` — archive météo historique',
                        '`&github: TOKEN ID` — configurer la sync Gist',
                        '`&sync:` — synchroniser avec GitHub Gist',
                        '',
                        '**Interface**',
                        '`TAB` — autocomplétion  |  `Entrée` — valider  |  `Échap` — annuler',
                        'Bouton **Theme** — basculer Auto / Dark / Light',
                        'Bouton **Load** — importer une cartouche JSON  |  **↓JSON** — exporter la vue courante',
                    ].join('\n');
                    this.parent.add(blockText);
                    this.parent.notify('Aide générée');
                },


                async fetchCoordinates(locationName) {
                    const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(locationName)}&count=1&language=fr`);
                    if (!res.ok) throw new Error("Geocoding failed");
                    const data = await res.json();
                    if (!data.results || data.results.length === 0) throw new Error("Location not found");
                    return data.results[0]; // { name, latitude, longitude, country }
                },

                async fetchMeteo(query) {
                    this.parent.notify(`Station Météo...`);
                    try {
                        const parts = query.trim().split(/\s+/);
                        if (parts.length < 2) throw new Error("Bad format");

                        const dateStr = parts.pop(); // Assume last is YYYY-MM-DD
                        const locStr = parts.join(' ');

                        // Verify date rough format
                        if (!/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) throw new Error("Bad date format");

                        this.parent.notify(`Localisation de ${locStr}...`);
                        const geo = await this.fetchCoordinates(locStr);

                        this.parent.notify(`Téléchargement archive météo...`);
                        const meteoUrl = `https://archive-api.open-meteo.com/v1/archive?latitude=${geo.latitude}&longitude=${geo.longitude}&start_date=${dateStr}&end_date=${dateStr}&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,wind_speed_10m_max&timezone=auto`;

                        const res = await fetch(meteoUrl);
                        if (!res.ok) throw new Error("Meteo archive failed");
                        const data = await res.json();

                        if (!data.daily || !data.daily.time || data.daily.time.length === 0) {
                            throw new Error("No data for date");
                        }

                        const d = data.daily;
                        const tmax = d.temperature_2m_max[0];
                        const tmin = d.temperature_2m_min[0];
                        const prec = d.precipitation_sum[0];
                        const wind = d.wind_speed_10m_max[0];

                        const cleanLocKey = geo.name.toLowerCase().replace(/[^a-z0-9]/g, '');

                        let blockText = `#meteo ~lieu:${cleanLocKey} ~date:${dateStr} !blue\n\n**${geo.name}, ${geo.country || ''}**\n*Bulletin du ${dateStr}*\n`;
                        blockText += `🌡️ Température : Min ${tmin}°C / Max ${tmax}°C\n`;
                        blockText += `🌧️ Précipitations : ${prec} mm\n`;
                        blockText += `💨 Vent max : ${wind} km/h`;

                        this.parent.add(blockText);
                        this.parent.notify("Archive météo générée");

                    } catch (err) {
                        if (err.message === "Bad format" || err.message === "Bad date format") {
                            this.parent.notify("Format erroné: &meteo: Lieu YYYY-MM-DD");
                        } else if (err.message === "Location not found") {
                            this.parent.notify("Lieu introuvable");
                        } else if (err.message === "No data for date") {
                            this.parent.notify("Date hors période archive");
                        } else {
                            this.parent.notify("Erreur réseau Météo");
                        }
                        console.error("ALBEDO Meteo Error:", err);
                    }
                },

                async fetchDefinition(word) {
                    this.parent.notify(`Recherche: ${word}...`);
                    try {
                        const response = await fetch(`https://fr.wiktionary.org/api/rest_v1/page/html/${encodeURIComponent(word)}`);
                        if (!response.ok) throw new Error("Mot introuvable");
                        const html = await response.text();
                        const doc = new DOMParser().parseFromString(html, 'text/html');
                        const defLists = doc.querySelectorAll('ol');
                        if (defLists.length === 0) throw new Error("Mot introuvable");
                        let blockText = `#définition ~mot:${word.toLowerCase()} !purple\n\n**${word}**`;
                        defLists[0].querySelectorAll('ul, dl, style, sup').forEach(el => el.remove());
                        const listItems = Array.from(defLists[0].querySelectorAll(':scope > li')).slice(0, 2);
                        listItems.forEach((li, index) => {
                            let text = li.textContent.replace(/\s+/g, ' ').trim();
                            if (text) blockText += `\n${index + 1}. ${text}`;
                        });
                        this.parent.add(blockText);
                        this.parent.notify("Définition ajoutée");
                    } catch (err) {
                        this.parent.notify(err.message === "Mot introuvable" ? "Mot inconnu" : "Erreur réseau");
                        console.error("ALBEDO Dico Error:", err);
                    }
                },

                async fetchWikiSummary(subject) {
                    this.parent.notify(`Recherche Wiki: ${subject}...`);
                    try {
                        const response = await fetch(`https://fr.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(subject)}`);
                        if (!response.ok) {
                            if (response.status === 404) throw new Error("Sujet introuvable");
                            throw new Error("Erreur réseau");
                        }
                        const data = await response.json();
                        const patternKey = subject.toLowerCase().replace(/\s+/g, '_');
                        const blockText = `#wiki ~sujet:${patternKey} !gray\n\n**${data.title}**\n${data.extract}`;
                        this.parent.add(blockText);
                        this.parent.notify("Résumé ajouté");
                    } catch (err) {
                        this.parent.notify(err.message === "Sujet introuvable" ? "Sujet inconnu" : "Erreur réseau");
                        console.error("ALBEDO Wiki Error:", err);
                    }
                },

                async fetchSources(query) {
                    this.parent.notify(`Recherche sources: ${query}...`);
                    try {
                        const response = await fetch(`https://api.crossref.org/works?query=${encodeURIComponent(query)}&select=title,author,URL,published&rows=3`);
                        if (!response.ok) throw new Error("Erreur réseau");
                        const data = await response.json();
                        const items = data.message.items;
                        if (items.length === 0) throw new Error("Aucune source");
                        const patternKey = query.toLowerCase().replace(/\s+/g, '_').substring(0, 25);
                        let blockText = `#sources ~sujet:${patternKey} !yellow\n\n**Littérature académique : "${query}"**`;
                        items.forEach((item, index) => {
                            const title = item.title ? item.title[0] : "Titre inconnu";
                            const year = item.published ? item.published['date-parts'][0][0] : "Date inconnue";
                            const author = (item.author && item.author[0] && item.author[0].family) ? item.author[0].family : "Auteur inconnu";
                            const url = item.URL || "";
                            blockText += `\n\n${index + 1}. *${title}* (${year}) - ${author}.`;
                            if (url) blockText += `\n[Consulter la source](${url})`;
                        });
                        this.parent.add(blockText);
                        this.parent.notify("Sources ajoutées");
                    } catch (err) {
                        this.parent.notify(err.message === "Aucune source" ? "Rien trouvé" : "Erreur réseau");
                        console.error("ALBEDO Source Error:", err);
                    }
                },

                async sync() {
                    if (!this.parent.meta.gistToken || !this.parent.meta.gistId) {
                        this.parent.notify("Config missing: &github: <TOKEN> <ID>");
                        return;
                    }
                    this.parent.notify("Syncing with GitHub...");
                    try {
                        const headers = {
                            'Authorization': `token ${this.parent.meta.gistToken}`,
                            'Accept': 'application/vnd.github.v3+json'
                        };
                        const controller = new AbortController();
                        const timeoutId = setTimeout(() => controller.abort(), 10000);
                        const res = await fetch(`https://api.github.com/gists/${this.parent.meta.gistId}`, {
                            headers,
                            signal: controller.signal
                        });
                        clearTimeout(timeoutId);
                        if (!res.ok) throw new Error("Gist fetch failed");
                        const gist = await res.json();
                        const fileNames = Object.keys(gist.files);
                        if (fileNames.length === 0) throw new Error("Gist is empty");
                        const primaryFileName = fileNames[0];
                        const gistFile = gist.files[primaryFileName];
                        const hasRemoteChanges = this.parent.meta.lastGistDate !== gist.updated_at;
                        const isLocalDirty = this.parent.meta.isDirty;
                        const isGistEmpty = gistFile.content.trim() === '[]' || gistFile.content.trim() === '';
                        const isLocalEmpty = this.parent.state.length === 0;
                        let shouldPull = false;
                        if (!this.parent.meta.lastGistDate) {
                            if (!isGistEmpty && isLocalEmpty) shouldPull = true;
                            else if (isGistEmpty && !isLocalEmpty) shouldPull = false;
                            else if (!isGistEmpty && !isLocalEmpty) shouldPull = true;
                        } else {
                            if (hasRemoteChanges) shouldPull = true;
                            else shouldPull = false;
                        }
                        if (!shouldPull && !isLocalDirty && this.parent.meta.lastGistDate) {
                            this.parent.notify("Up to date");
                            return;
                        }
                        if (shouldPull) {
                            try {
                                const gistData = JSON.parse(gistFile.content);
                                if (!Array.isArray(gistData)) throw new Error("Invalid format");
                                this.parent.state = [];
                                await db.clear('blocks');
                                this.parent.state = gistData;
                                for (const block of this.parent.state) {
                                    await db.put('blocks', block);
                                }
                                this.parent.meta.lastGistDate = gist.updated_at;
                                this.parent.meta.isDirty = false;
                                this.parent.saveMeta();
                                this.parent.updateTagsIndex();
                                this.parent.render();
                                this.parent.notify("Pulled from Gist");
                            } catch (e) { throw new Error("Parse error"); }
                        } else {
                            const payload = {
                                files: {
                                    [primaryFileName]: {
                                        content: JSON.stringify(this.parent.state, null, 2)
                                    }
                                }
                            };
                            const pushController = new AbortController();
                            const pushTimeoutId = setTimeout(() => pushController.abort(), 10000);
                            const patchRes = await fetch(`https://api.github.com/gists/${this.parent.meta.gistId}`, {
                                method: 'PATCH',
                                headers,
                                body: JSON.stringify(payload),
                                signal: pushController.signal
                            });
                            clearTimeout(pushTimeoutId);
                            if (!patchRes.ok) throw new Error("Gist push failed");
                            const updatedGist = await patchRes.json();
                            this.parent.meta.lastGistDate = updatedGist.updated_at;
                            this.parent.meta.isDirty = false;
                            this.parent.saveMeta();
                            this.parent.notify("Pushed to Gist");
                        }
                    } catch (err) {
                        console.error("ALBEDO Sync Error:", err);
                        if (err.name === 'AbortError') {
                            this.parent.notify("Sync Error: Timeout");
                        } else {
                            this.parent.notify("Sync Error: " + err.message);
                        }
                    }
                }
            },

            events: {
                parent: null,
                init(p) {
                    this.parent = p;
                    this.setupCommander();
                    this.setupFileUploader();

                    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
                        if (this.parent.meta.theme === 'auto') {
                            this.parent.applyTheme();
                        }
                    });

                    window.addEventListener('online', () => this.parent.updateNetworkStatus());
                    window.addEventListener('offline', () => this.parent.updateNetworkStatus());
                },

                setupCommander() {
                    const autoGrowCommander = () => {
                        this.parent.ui.input.style.height = (this.parent.ui.input.scrollHeight) + "px";
                    };

                    // Helper: clears the commander input and resets all related UI state
                    const resetCommander = () => {
                        this.parent.ui.input.value = '';
                        this.parent.ui.input.style.height = 'auto';
                        this.parent.ui.suggestion.classList.remove('active');
                        this.parent.activeSuggestion = null;
                    };

                    this.parent.ui.input.addEventListener('input', (e) => {
                        autoGrowCommander();
                        const val = this.parent.ui.input.value;
                        const words = val.split(/\s+/);
                        const lastWord = words[words.length - 1];
                        this.parent.activeSuggestion = null;

                        if (lastWord.startsWith('#') && lastWord.length > 1) {
                            const match = Array.from(this.parent.tagsIndex).sort()
                                .find(t => t.toLowerCase().startsWith(lastWord.toLowerCase()) && t !== lastWord);
                            if (match) {
                                this.parent.activeSuggestion = match;
                                this.parent.ui.suggestion.innerHTML = `<kbd>TAB</kbd> <b>${match}</b>`;
                                this.parent.ui.suggestion.classList.add('active');
                            } else {
                                this.parent.ui.suggestion.classList.remove('active');
                            }
                        }
                        else if (lastWord.startsWith('!') && lastWord.length > 1) {
                            const match = this.parent.validColors.map(c => '!' + c)
                                .find(c => c.startsWith(lastWord.toLowerCase()) && c !== lastWord.toLowerCase());
                            if (match) {
                                this.parent.activeSuggestion = match;
                                this.parent.ui.suggestion.innerHTML = `<kbd>TAB</kbd> <b>${match}</b>`;
                                this.parent.ui.suggestion.classList.add('active');
                            } else {
                                this.parent.ui.suggestion.classList.remove('active');
                            }
                        }
                        else if (lastWord.startsWith('&') && lastWord.length > 0) {
                            const match = this.parent.validExternals
                                .find(cmd => cmd.startsWith(lastWord.toLowerCase()) && cmd !== lastWord.toLowerCase());
                            if (match) {
                                this.parent.activeSuggestion = match;
                                this.parent.ui.suggestion.innerHTML = `<kbd>TAB</kbd> <b>${match}</b>`;
                                this.parent.ui.suggestion.classList.add('active');
                            } else {
                                this.parent.ui.suggestion.classList.remove('active');
                            }
                        }
                        else if ((lastWord.startsWith('~') || val.startsWith('?~')) && lastWord.length > 0) {
                            let searchPrefix = '';
                            if (lastWord.startsWith('?~')) searchPrefix = '~' + lastWord.substring(2);
                            else if (lastWord.startsWith('~')) searchPrefix = lastWord;
                            else if (val.startsWith('?~')) searchPrefix = '~' + lastWord;

                            if (searchPrefix !== '~' && searchPrefix !== '') {
                                const match = Array.from(this.parent.patternsIndex).sort()
                                    .find(p => p.toLowerCase().startsWith(searchPrefix.toLowerCase()) && p !== searchPrefix.toLowerCase());

                                if (match) {
                                    if (lastWord.startsWith('?~')) this.parent.activeSuggestion = '?~' + match.substring(1);
                                    else if (lastWord.startsWith('~')) this.parent.activeSuggestion = match + ':';
                                    else this.parent.activeSuggestion = match.substring(1);

                                    this.parent.ui.suggestion.innerHTML = `<kbd>TAB</kbd> <b>${this.parent.activeSuggestion}</b>`;
                                    this.parent.ui.suggestion.classList.add('active');
                                } else {
                                    this.parent.ui.suggestion.classList.remove('active');
                                }
                            } else {
                                this.parent.ui.suggestion.classList.remove('active');
                            }
                        }
                        else {
                            this.parent.ui.suggestion.classList.remove('active');
                        }

                        if (val.startsWith('?~')) {
                            this.parent.ui.header.classList.add('query-mode');
                            const cleanStr = val.substring(2).trim();
                            const parts = cleanStr.split(/\s+/);
                            let direction = 'c';
                            let patternKey = '';

                            if (parts[0].toLowerCase() === 'd' && parts.length > 1) {
                                direction = 'd';
                                patternKey = parts[1];
                            } else if (parts[0]) {
                                patternKey = parts[0];
                            }

                            if (patternKey) {
                                const pattern = patternKey.startsWith('~') ? patternKey : '~' + patternKey;
                                this.parent.requestRender({ type: 'sort', direction, pattern });
                            } else {
                                this.parent.requestRender({ type: 'search', query: val });
                            }
                        }
                        else if (val.startsWith('?')) {
                            this.parent.ui.header.classList.add('query-mode');
                            this.parent.requestRender({ type: 'search', query: val.substring(1).trim() });
                        } else {
                            this.parent.ui.header.classList.remove('query-mode');
                            if (this.parent.isFiltering) {
                                this.parent.requestRender({});
                                this.parent.isFiltering = false;
                            }
                        }
                    });

                    this.parent.ui.input.addEventListener('keydown', (e) => {
                        if (e.key === 'Tab' && this.parent.activeSuggestion) {
                            e.preventDefault();
                            const words = this.parent.ui.input.value.split(/\s+/);
                            words.pop();
                            words.push(this.parent.activeSuggestion);
                            this.parent.ui.input.value = words.join(' ') + ' ';
                            this.parent.activeSuggestion = null;
                            this.parent.ui.suggestion.classList.remove('active');
                            autoGrowCommander();
                            this.parent.ui.input.dispatchEvent(new Event('input'));
                            return;
                        }

                        if (e.key === 'Enter' && !e.shiftKey) {
                            e.preventDefault();
                            const val = this.parent.ui.input.value.trim();

                            if (val.startsWith('&dic:')) {
                                const word = val.replace('&dic:', '').trim();
                                if (word) this.parent.api.fetchDefinition(word);
                                resetCommander();
                                return;
                            }
                            else if (val.startsWith('&wiki:')) {
                                const subject = val.replace('&wiki:', '').trim();
                                if (subject) this.parent.api.fetchWikiSummary(subject);
                                resetCommander();
                                return;
                            }
                            else if (val.startsWith('&source:')) {
                                const query = val.replace('&source:', '').trim();
                                if (query) this.parent.api.fetchSources(query);
                                resetCommander();
                                return;
                            }
                            else if (val.startsWith('&github:')) {
                                const creds = val.replace('&github:', '').trim().split(/\s+/);
                                if (creds.length >= 2) {
                                    this.parent.meta.gistToken = creds[0];
                                    this.parent.meta.gistId = creds[1];
                                    this.parent.saveMeta();
                                    this.parent.updateGistStatus();
                                    this.parent.notify("GitHub config saved");
                                } else {
                                    this.parent.notify("Error: &github: <TOKEN> <GIST_ID>");
                                }
                                resetCommander();
                                return;
                            }
                            else if (val.startsWith('&sync:')) {
                                this.parent.api.sync();
                                resetCommander();
                                return;
                            }
                            else if (val.startsWith('&meteo:')) {
                                const query = val.replace('&meteo:', '').trim();
                                if (query) this.parent.api.fetchMeteo(query);
                                resetCommander();
                                return;
                            }
                            else if (val === '&help') {
                                this.parent.api.generateHelp();
                                resetCommander();
                                return;
                            }
                            if (val && !val.startsWith('?')) {
                                this.parent.add(val);
                                resetCommander();
                            }
                        }
                        else if (e.key === 'Escape') {
                            this.parent.ui.input.value = '';
                            this.parent.ui.input.style.height = 'auto';
                            this.parent.ui.header.classList.remove('query-mode');
                            this.parent.ui.suggestion.classList.remove('active');
                            this.parent.activeSuggestion = null;
                            this.parent.render();
                        }
                    });
                },

                setupFileUploader() {
                    document.getElementById('upload-trigger').addEventListener('change', (e) => {
                        if (e.target.files.length > 0) {
                            this.parent.loadCartridge(e.target.files[0]);
                            e.target.value = '';
                        }
                    });
                }
            },

            ui: {
                header: document.getElementById('header'),
                input: document.getElementById('commander'),
                feed: document.getElementById('feed'),
                stats: document.getElementById('stats'),
                baseLabel: document.getElementById('base-label'),
                toast: document.getElementById('toast'),
                suggestion: document.getElementById('suggestion')
            },

            requestRender(options = {}) {
                if (this.renderTID) clearTimeout(this.renderTID);
                this.renderTID = setTimeout(() => {
                    this.render(options);
                }, 150);
            },

            async init() {
                try {
                    await db.init();
                    const blocks = await db.getAll('blocks');
                    const metas = await db.getAll('meta');

                    this.state = blocks.sort((a, b) => b.ts - a.ts);
                    if (metas.length > 0) {
                        this.meta = { ...this.meta, ...metas[0] };
                    }
                    if (!this.meta.theme) this.meta.theme = 'auto'; // Fallback for existing carts
                } catch (err) {
                    console.error("ALBEDO: Core Corruption", err);
                    alert("FATAL ERROR: Memory Corrupted. Halting to prevent data overwrite.");
                    return; // Halt initialization
                }

                this.updateTagsIndex();
                this.render();

                this.api.init(this);
                this.events.init(this);
                this.applyTheme();
                this.updateNetworkStatus();
                this.updateGistStatus();

                if (this.meta.gistToken && this.meta.gistId && navigator.onLine) {
                    this.api.sync();
                }
            },

            updateNetworkStatus() {
                const netInd = document.getElementById('net-indicator');
                if (netInd) {
                    if (navigator.onLine) {
                        netInd.className = 'is-online';
                        netInd.title = 'Online';
                    } else {
                        netInd.className = 'is-offline';
                        netInd.title = 'Offline';
                    }
                }
            },

            updateGistStatus() {
                if (this.meta.gistToken && this.meta.gistId) {
                    document.body.classList.add('has-gist');
                } else {
                    document.body.classList.remove('has-gist');
                }
            },

            applyTheme() {
                const isDarkOS = window.matchMedia('(prefers-color-scheme: dark)').matches;
                const isDarkTheme = this.meta.theme === 'dark' || (this.meta.theme === 'auto' && isDarkOS);
                document.documentElement.setAttribute('data-theme', isDarkTheme ? 'dark' : 'light');

                const btn = document.getElementById('theme-toggle');
                if (btn) {
                    const labels = { 'auto': 'Auto', 'dark': 'Dark', 'light': 'Light' };
                    btn.innerText = labels[this.meta.theme] || 'Auto';
                }
            },

            toggleTheme() {
                const cycle = { 'auto': 'dark', 'dark': 'light', 'light': 'auto' };
                this.meta.theme = cycle[this.meta.theme] || 'auto';
                this.saveMeta();
                this.applyTheme();
                this.notify("Theme: " + this.meta.theme.charAt(0).toUpperCase() + this.meta.theme.slice(1));
            },

            updateTagsIndex() {
                this.tagsIndex.clear();
                this.patternsIndex.clear();
                this.state.forEach(block => {
                    (block.tags || []).forEach(t => this.tagsIndex.add(t));
                    // Index pattern keys (e.g. '~date' from '~date:2026') for autocomplete
                    (block.patterns || []).forEach(p => {
                        const key = p.split(':')[0];
                        this.patternsIndex.add(key);
                    });
                });
            },

            escape(str) {
                if (!str) return '';
                return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
            },

            escapeRegExp(string) {
                return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            },

            /**
             * Formate une chaîne raw en HTML enrichi pour l'affichage.
             * Gère la syntaxe markdown basique (h1, h2, bold, italic, citations, code),
             * les liens cliquables, et le moteur Wiki Media (thumbnails optimisés).
             * Intègre aussi un moteur de surbrillance (highlight engine) pour les 
             * requêtes utilisateur, en ignorant les mots-clés booléens (AND, OR, NOT).
             * 
             * @param {string} str - La chaîne Markdown/texte brute à parser.
             * @param {string} [query=''] - La requête courante (utilisée pour surligner les résultats).
             * @returns {string} Le code HTML formaté et sanitizeé.
             */
            format(str, query = '') {
                let s = this.escape(str);

                s = s.replace(/^## (.*$)\n?/gm, '<div class="md-h2">$1</div>');
                s = s.replace(/^# (.*$)\n?/gm, '<div class="md-h1">$1</div>');
                s = s.replace(/^&gt; (.*$)\n?/gm, '<div class="md-quote">$1</div>');

                s = s.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
                s = s.replace(/\*(.*?)\*/g, '<i>$1</i>');
                s = s.replace(/\[(.*?)\]\((.*?)\)/g, (match, text, url) => {
                    const cleanUrl = (url.startsWith('http://') || url.startsWith('https://') || url.startsWith('mailto:')) ? url : '#';
                    return `<a href="${cleanUrl}" target="_blank" style="color: var(--accent); text-decoration: none;">${text}</a>`;
                });
                // ... suite (Wiki Commons Engine, etc.)    

                // --- WIKI COMMONS ENGINE ---
                // Matches raw commons URLs and dynamically fetches the lightweight thumbnail
                const wikiRegex = /https:\/\/upload\.wikimedia\.org\/wikipedia\/commons\/([^\s"'<>]+)/gi;
                s = s.replace(wikiRegex, (match, path) => {
                    let src = match;

                    // If it's not already a thumbnail, rewrite the URL to request a 640px version
                    if (!path.startsWith('thumb/')) {
                        const parts = path.split('/');
                        const filename = parts[parts.length - 1];
                        const ext = filename.split('.').pop().toLowerCase();

                        // Wiki thumbnail servers append .png to svg thumbnails
                        if (['jpg', 'jpeg', 'png', 'webp'].includes(ext)) {
                            src = `https://upload.wikimedia.org/wikipedia/commons/thumb/${path}/640px-${filename}`;
                        } else if (ext === 'svg') {
                            src = `https://upload.wikimedia.org/wikipedia/commons/thumb/${path}/640px-${filename}.png`;
                        }
                    }
                    // decoding="async" prevents the main thread from blocking while parsing the image
                    return `<img src="${src}" class="wiki-img" loading="lazy" decoding="async" alt="Wiki Media">`;
                });

                s = s.replace(/`(.*?)`/g, '<code>$1</code>');

                // --- HIGHLIGHT ENGINE ---
                if (query) {
                    // Extract just the search terms (ignore AND, OR, NOT operators)
                    const termsToHighlight = query.split(/\s+/)
                        .filter(term => !['AND', 'OR', 'NOT'].includes(term))
                        .map(term => this.escapeRegExp(term));

                    if (termsToHighlight.length > 0) {
                        const safeQueryGroup = termsToHighlight.join('|');
                        const regex = new RegExp(`(${safeQueryGroup})(?![^<]*>)`, 'gi');
                        s = s.replace(regex, '<mark>$1</mark>');
                    }
                }

                return s;
            },

            parse(raw) {
                const tags = [];
                const patterns = [];
                let color = null;
                let text = raw.trim();

                // Advanced Syntax Engine: Extracts #tags, !colors, et ~patterns
                while (text.startsWith('#') || text.startsWith('!') || text.startsWith('~')) {
                    const spaceIdx = text.search(/\s/);
                    const token = spaceIdx === -1 ? text : text.substring(0, spaceIdx);

                    if (token.startsWith('#')) {
                        tags.push(token);
                    } else if (token.startsWith('~')) {
                        patterns.push(token); // Stockage des tags de tri
                    } else if (token.startsWith('!')) {
                        const colorAttempt = token.substring(1).toLowerCase();
                        if (this.validColors.includes(colorAttempt)) {
                            color = colorAttempt;
                        }
                    }

                    if (spaceIdx === -1) {
                        text = ''; break;
                    } else {
                        text = text.substring(spaceIdx).trimStart();
                    }
                }
                return { tags, patterns, color, text };
            },

            add(raw) {
                if (!raw.trim()) return; // Guard against empty input
                const data = this.parse(raw);
                const uid = crypto.randomUUID();

                const block = {
                    id: uid,
                    ts: Date.now(),
                    isPinned: false,
                    raw: raw,
                    color: data.color,
                    tags: data.tags,
                    patterns: data.patterns,
                    body: data.text
                };

                this.state.unshift(block);
                this.updateTagsIndex();
                this.render();
                db.put('blocks', block);
                this.markDirty();
            },

            update(id, newRaw) {
                const idx = this.state.findIndex(x => x.id === id);
                if (idx === -1) return;

                if (!newRaw.trim()) {
                    this.remove(id);
                } else {
                    const data = this.parse(newRaw);
                    this.state[idx].raw = newRaw;
                    this.state[idx].tags = data.tags;
                    this.state[idx].patterns = data.patterns;
                    this.state[idx].color = data.color;
                    this.state[idx].body = data.text;

                    this.updateTagsIndex();
                    this.render();
                    db.put('blocks', this.state[idx]);
                    this.markDirty();
                }
            },

            remove(id) {
                this.state = this.state.filter(x => x.id !== id);
                this.updateTagsIndex();
                this.render();
                db.delete('blocks', id);
                this.markDirty();
            },

            togglePin(id) {
                const idx = this.state.findIndex(x => x.id === id);
                if (idx === -1) return;
                this.state[idx].isPinned = !this.state[idx].isPinned;
                this.render();
                db.put('blocks', this.state[idx]);
                this.markDirty();
            },

            markDirty() {
                this.meta.isDirty = true;
                this.saveMeta();

                this.actionCount = (this.actionCount || 0) + 1;
                if (this.actionCount >= 5 && navigator.onLine && this.meta.gistToken && this.meta.gistId) {
                    this.api.sync();
                    this.actionCount = 0;
                }
            },

            saveMeta() { db.put('meta', this.meta); },

            getExportFilename(ext) {
                let identifier = this.meta.name.toLowerCase();
                if (this.currentRenderOptions && this.currentRenderOptions.query) {
                    const safeQ = this.currentRenderOptions.query.replace(/[^a-z0-9]/gi, '_').toLowerCase();
                    identifier += `_search-${safeQ}`;
                } else if (this.currentRenderOptions && this.currentRenderOptions.pattern) {
                    const safeP = this.currentRenderOptions.pattern.replace(/[^a-z0-9]/gi, '_').toLowerCase();
                    identifier += `_sort-${safeP}`;
                }
                return `albedo_${identifier}_${this.getDateCode()}.${ext}`;
            },

            exportJSON() {
                const filename = this.getExportFilename('json');
                this.downloadFile(JSON.stringify(this.currentViewData, null, 2), filename, 'application/json');
                const count = this.currentViewData.length;
                this.notify(`Exported ${count} Block${count > 1 ? 's' : ''}`);
            },

            exportMD() {
                let md = `# ALBEDO EXPORT: ${this.meta.name}\n\n`;

                if (this.currentRenderOptions && this.currentRenderOptions.query) {
                    md += `> Filtered by query: "${this.currentRenderOptions.query}"\n\n`;
                }

                this.currentViewData.forEach(block => {
                    const d = new Date(block.ts);
                    const ts = d.toISOString().split('T')[0];
                    const metaTags = (block.tags || []).join(' ') + (block.color ? ` !${block.color}` : '');
                    const patterns = (block.patterns || []).join(' ');
                    const allMeta = [ts, metaTags, patterns].filter(Boolean).join(' ');

                    md += `### ${allMeta}\n${block.body}\n\n---\n\n`;
                });

                const filename = this.getExportFilename('md');
                this.downloadFile(md, filename, 'text/markdown');
                const count = this.currentViewData.length;
                this.notify(`Exported ${count} Block${count > 1 ? 's' : ''}`);
            },

            downloadFile(content, filename, type) {
                const blob = new Blob([content], { type: type });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = filename; a.click();
                URL.revokeObjectURL(url);
            },

            async loadCartridge(file) {
                const isPopulated = this.state.length > 0;
                let mode = 'replace';

                if (isPopulated) {
                    const choice = await this.modal(`Merge "${file.name}" with current base?`, 'confirm', 'Merge', 'Replace');
                    if (!choice) {
                        const confirmWipe = await this.modal(`WARNING: This will wipe your local memory before loading. Proceed?`, 'confirm', 'Proceed', 'Cancel');
                        if (!confirmWipe) return;
                        mode = 'replace';
                    } else {
                        mode = 'merge';
                    }
                }

                const reader = new FileReader();
                reader.onload = async (e) => {
                    try {
                        const json = JSON.parse(e.target.result);
                        if (!Array.isArray(json)) throw new Error("Invalid Format");
                        // Validate each block has the minimum required fields
                        if (!json.every(b => b && typeof b.id === 'string' && typeof b.ts === 'number' && typeof b.raw === 'string')) {
                            throw new Error("Invalid Format");
                        }

                        if (mode === 'replace') {
                            await this.wipe(true);
                            this.state = json;

                            const baseName = file.name.replace(/\.[^/.]+$/, "").toUpperCase().replace("ALBEDO_", "");
                            this.meta.name = baseName || "IMPORTED";

                            for (const block of this.state) {
                                await db.put('blocks', block);
                            }
                            this.notify(`Base Loaded: ${this.meta.name}`);
                        }
                        else if (mode === 'merge') {
                            let mergedCount = 0;
                            let addedCount = 0;

                            for (const incoming of json) {
                                const localIdx = this.state.findIndex(b => b.id === incoming.id);
                                if (localIdx === -1) {
                                    // New block
                                    this.state.push(incoming);
                                    await db.put('blocks', incoming);
                                    addedCount++;
                                } else {
                                    // Block exists, compare timestamps
                                    if (incoming.ts > this.state[localIdx].ts) {
                                        this.state[localIdx] = incoming;
                                        await db.put('blocks', incoming);
                                        mergedCount++;
                                    }
                                }
                            }

                            // Sort again chronologically after merge pushes
                            this.state.sort((a, b) => b.ts - a.ts);
                            this.notify(`Merged: +${addedCount} / ^${mergedCount}`);
                        }

                        this.markDirty();
                        this.updateTagsIndex();
                        this.render();
                    } catch (err) {
                        await this.modal("Corrupt Cartridge", 'alert');
                        console.error(err);
                    }
                };
                reader.readAsText(file);
            },

            async wipe(silent = false) {
                if (!silent) {
                    const confirmed = await this.modal("CLEAR MEMORY?", 'confirm', 'Clear', 'Cancel');
                    if (!confirmed) return;
                }

                this.state = [];
                this.meta.name = "PRIMARY";

                await db.clear('blocks');
                this.markDirty(); // also calls saveMeta

                this.updateTagsIndex();
                this.render();
                if (!silent) this.notify("Memory Cleared");
            },

            setupObserver() {
                if (this.observer) this.observer.disconnect();
                this.observer = new IntersectionObserver((entries) => {
                    if (entries[0].isIntersecting) {
                        this.renderMore();
                    }
                }, { rootMargin: "300px" });
            },

            /**
             * Moteur de rendu principal de la Feed. Filtre et trie la base de données 
             * (this.state) selon la commande utilisateur, puis prépare l'affichage 
             * par lots (lazy loading) via `renderMore()`.
             * Évalue les recherches simples et complexes avec support des opérateurs 
             * booléens de gauche à droite (AND, OR, NOT). Gère aussi le tri 
             * alphanumérique par pattern personnalisés (ex: ~date).
             * 
             * @param {Object} options - Paramètres du rendu.
             * @param {string} [options.type] - 'search' pour la recherche, 'sort' pour le tri par clé, null par défaut.
             * @param {string} [options.query] - Requête texte de recherche (avec ou sans booléens).
             * @param {string} [options.pattern] - Clé de tri (ex: '~priorité').
             * @param {string} [options.direction='c'] - 'c' pour croissant, 'd' pour décroissant.
             */
            render(options = {}) {
                this.currentRenderOptions = options;

                const type = options.type || null;
                const query = options.query || '';
                const pattern = options.pattern || '';
                const direction = options.direction || 'c';

                this.isFiltering = !!type;
                let viewData = [...this.state];

                // 1. ÉTAPE DE FILTRAGE
                if (type === 'search' && query) {
                    // Boolean parsing logic
                    const tokens = query.split(/\s+/).filter(t => t.trim() !== '');
                    const hasOperators = tokens.some(t => ['AND', 'OR', 'NOT'].includes(t));

                    if (!hasOperators) {
                        // Simple inclusion fallback if no operators are used
                        viewData = viewData.filter(item => item.raw.toLowerCase().includes(query.toLowerCase()));
                    } else {
                        // --- Advanced Boolean Evaluator ---
                        // Analyse les tokens de gauche à droite. Le flux par défaut est 
                        // additif (OR) pour le premier mot. Supporte la négation ciblée (NOT) 
                        // et les intersections strictes (AND) ou unions (OR).
                        viewData = viewData.filter(item => {
                            const rawText = item.raw.toLowerCase();
                            let result = false;
                            let currentOp = 'OR'; // Default initial state lets first token be additive
                            let invertNext = false;

                            for (let i = 0; i < tokens.length; i++) {
                                const t = tokens[i];

                                if (t === 'NOT') {
                                    invertNext = true;
                                    continue;
                                }

                                if (t === 'AND' || t === 'OR') {
                                    currentOp = t;
                                    continue;
                                }

                                // It's a search term
                                const termMatched = rawText.includes(t.toLowerCase());
                                const finalMatch = invertNext ? !termMatched : termMatched;

                                if (currentOp === 'AND') {
                                    result = result && finalMatch;
                                } else if (currentOp === 'OR') {
                                    // If it's the very first term, result starts as false, OR makes it true
                                    result = result || finalMatch;
                                }

                                // Reset modifier flags
                                invertNext = false;
                            }
                            return result;
                        });
                    }
                }
                else if (type === 'sort' && pattern) {
                    // Ne garde que les blocs ayant la clé demandée (ex: on tape "~date", on garde "~date:25-02-26")
                    viewData = viewData.filter(item =>
                        (item.patterns || []).some(p => p.startsWith(pattern + ':') || p === pattern)
                    );
                }

                // 2. ÉTAPE DE TRI
                viewData.sort((a, b) => {
                    if (type === 'sort' && pattern) {
                        // Cherche le pattern exact pour extraire sa valeur
                        const pA = (a.patterns || []).find(p => p.startsWith(pattern + ':') || p === pattern) || '';
                        const pB = (b.patterns || []).find(p => p.startsWith(pattern + ':') || p === pattern) || '';

                        // Extrait la "value" après les ":"
                        const valA = pA.includes(':') ? pA.substring(pattern.length + 1) : '';
                        const valB = pB.includes(':') ? pB.substring(pattern.length + 1) : '';

                        const dirMulti = direction === 'd' ? -1 : 1;

                        return dirMulti * valA.localeCompare(valB, undefined, { numeric: true, sensitivity: 'base' });
                    }

                    // Fallback (Épingles + Chronologique)
                    const aPinned = !!a.isPinned;
                    const bPinned = !!b.isPinned;
                    if (aPinned === bPinned) return b.ts - a.ts;
                    return aPinned ? -1 : 1;
                });

                this.ui.baseLabel.innerText = this.meta.name;
                this.currentViewData = viewData;
                this.renderedCount = 0;

                this.ui.feed.innerHTML = '';

                if (this.currentViewData.length === 0) {
                    this.ui.feed.innerHTML = `<div class="void-msg">${this.isFiltering ? 'NO MATCHES' : 'THE VOID IS EMPTY'}</div>`;
                    this.updateStats();
                    return;
                }

                this.renderMore();
            },

            renderMore() {
                if (this.renderedCount >= this.currentViewData.length) return;
                if (this.observer) this.observer.disconnect();

                const fragment = document.createDocumentFragment();
                const nextBatch = this.currentViewData.slice(this.renderedCount, this.renderedCount + this.viewLimit);

                const type = this.currentRenderOptions.type || null;
                const query = this.currentRenderOptions.query || '';
                const pattern = this.currentRenderOptions.pattern || '';

                nextBatch.forEach(block => {
                    const el = document.createElement('div');
                    const d = new Date(block.ts);
                    const timeStr = `${d.getMonth() + 1}/${d.getDate()} · ${d.getHours()}:${d.getMinutes().toString().padStart(2, '0')}`;
