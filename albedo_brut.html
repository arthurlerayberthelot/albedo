                        viewData = viewData.filter(item => item.raw.toLowerCase().includes(query.toLowerCase()));
                    } else {
                        viewData = viewData.filter(item => {
                            const rawText = item.raw.toLowerCase();
                            let result = false;
                            let currentOp = 'OR';
                            let invertNext = false;
                            for (let i = 0; i < tokens.length; i++) {
                                const t = tokens[i];
                                if (t === 'NOT') { invertNext = true; continue; }
                                if (t === 'AND' || t === 'OR') { currentOp = t; continue; }
                                const termMatched = rawText.includes(t.toLowerCase());
                                const finalMatch = invertNext ? !termMatched : termMatched;
                                if (currentOp === 'AND') {
                                    result = result && finalMatch;
                                } else if (currentOp === 'OR') {
                                    result = result || finalMatch;
                                }
                                invertNext = false;
                            }
                            return result;
                        });
                    }
                }
                else if (type === 'sort' && pattern) {
                    viewData = viewData.filter(item =>
                        (item.patterns || []).some(p => p.startsWith(pattern + ':') || p === pattern)
                    );
                }

                viewData = viewData.filter(item => {
                    if (this.currentFolder === '/') return true;
                    const itemFolder = item.folder || '/';
                    return itemFolder === this.currentFolder;
                });

                viewData.sort((a, b) => {
                    if (type === 'sort' && pattern) {
                        const pA = (a.patterns || []).find(p => p.startsWith(pattern + ':') || p === pattern) || '';
                        const pB = (b.patterns || []).find(p => p.startsWith(pattern + ':') || p === pattern) || '';
                        const valA = pA.includes(':') ? pA.substring(pattern.length + 1) : '';
                        const valB = pB.includes(':') ? pB.substring(pattern.length + 1) : '';
                        const dirMulti = direction === 'd' ? -1 : 1;
                        return dirMulti * valA.localeCompare(valB, undefined, { numeric: true, sensitivity: 'base' });
                    }
                    const aPinned = !!a.isPinned;
                    const bPinned = !!b.isPinned;
                    if (aPinned === bPinned) return b.ts - a.ts;
                    return aPinned ? -1 : 1;
                });

                this.ui.baseLabel.innerText = this.meta.name;
                this.currentViewData = viewData;
                this.renderedCount = 0;
                this.ui.feed.innerHTML = '';

                if (this.currentViewData.length === 0) {
                    this.ui.feed.innerHTML = `<div class="void-msg">${this.isFiltering ? 'NO MATCHES' : 'EMPTY'}</div>`;
                    this.updateStats();
                    return;
                }
                this.renderMore();
            },

            renderMore() {
                if (this.renderedCount >= this.currentViewData.length) return;
                if (this.observer) this.observer.disconnect();

                const fragment = document.createDocumentFragment();
                const nextBatch = this.currentViewData.slice(this.renderedCount, this.renderedCount + this.viewLimit);
                const type = this.currentRenderOptions.type || null;
                const query = this.currentRenderOptions.query || '';
                const pattern = this.currentRenderOptions.pattern || '';

                nextBatch.forEach(block => {
                    const el = document.createElement('div');
                    const d = new Date(block.ts);
                    const timeStr = `${d.getMonth() + 1}/${d.getDate()} ${d.getHours()}:${d.getMinutes().toString().padStart(2, '0')}`;
                    const formattedBody = this.format(block.body, type === 'search' ? query : '');

                    const tagsHtml = (block.tags || []).map(t => {
                        let displayTag = this.escape(t);
                        if (type === 'search' && query) {
                            const termsToHighlight = query.split(/\s+/)
                                .filter(term => !['AND', 'OR', 'NOT'].includes(term))
                                .map(term => this.escapeRegExp(term));
                            if (termsToHighlight.length > 0) {
                                const safeQGroup = termsToHighlight.join('|');
                                displayTag = displayTag.replace(new RegExp(`(${safeQGroup})`, 'gi'), '<mark>$1</mark>');
                            }
                        }
                        return `<span class="token">${displayTag}</span>`;
                    }).join('');

                    const patternsHtml = (block.patterns || []).map(p => {
                        let cleanPattern = this.escape(p).replace(/^~/, '');
                        let displayPattern = cleanPattern;
                        const colonIdx = cleanPattern.indexOf(':');
                        if (colonIdx !== -1) {
                            const key = cleanPattern.substring(0, colonIdx + 1);
                            const val = cleanPattern.substring(colonIdx + 1);
                            displayPattern = `${key}<strong>${val}</strong>`;
                        }
                        if (type === 'sort' && pattern && p.startsWith(pattern)) {
                            displayPattern = `<mark style="padding: 0 2px;">${displayPattern}</mark>`;
                        }
                        return `<span class="token-pattern">${displayPattern}</span>`;
                    }).join('');

                    const pinClass = block.isPinned ? ' is-pinned' : '';
                    const pinActive = block.isPinned ? ' active' : '';
                    let colorClass = block.color ? ' has-color' : '';

                    el.className = `block${colorClass}${pinClass}`;

                    if (block.color) {
                        el.style.setProperty('--b-bg', `var(--c-${block.color}-bg)`);
                        el.style.setProperty('--b-ink', `var(--c-${block.color}-ink)`);
                    }

                    el.innerHTML = `
                        <div class="block-header">
                            <span>${timeStr}</span>
                            <div class="action-btns">
                                <button class="action-btn pin-btn${pinActive}" aria-label="Pin" onclick="sys.togglePin('${block.id}')">*</button>
                                <button class="action-btn del-btn" aria-label="Delete" onclick="sys.remove('${block.id}')">x</button>
                            </div>
                        </div>
                        <div class="content" id="b-${block.id}" onclick="sys.edit('${block.id}')">${tagsHtml}${patternsHtml}${formattedBody}</div>
                    `;
                    fragment.appendChild(el);
                });

                this.ui.feed.appendChild(fragment);
                this.renderedCount += nextBatch.length;
                this.updateStats();

                if (this.renderedCount < this.currentViewData.length) {
                    if (!this.observer) this.setupObserver();
                    const lastChild = this.ui.feed.lastElementChild;
                    if (lastChild) this.observer.observe(lastChild);
                }
            },

            edit(id) {
                const block = this.state.find(x => x.id === id);
                if (!block) return;
                const display = document.getElementById(`b-${id}`);
                if (!display || display.tagName === 'TEXTAREA') return;
                const area = document.createElement('textarea');
                area.className = 'editor';
                area.value = block.raw;
                const autoGrow = () => {
                    area.style.height = 'auto';
                    area.style.height = (area.scrollHeight + 5) + "px";
                };
                setTimeout(autoGrow, 0);
                area.addEventListener('input', autoGrow);
                area.onblur = () => this.update(id, area.value);
                area.onkeydown = (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault(); area.blur();
                    }
                };
                display.replaceWith(area);
                area.focus();
            },

            updateStats() {
                const count = this.state.length;
                try {
                    const bytes = new TextEncoder().encode(JSON.stringify(this.state)).length;
                    const kb = (bytes / 1024).toFixed(2);
                    this.ui.stats.innerText = `${count} UNITS | ${kb} KB`;
                } catch (e) {
                    this.ui.stats.innerText = `${count} UNITS`;
                }
            },

            getDateCode() {
                const d = new Date();
                return `${d.getFullYear()}${(d.getMonth() + 1).toString().padStart(2, '0')}${d.getDate().toString().padStart(2, '0')}`;
            },

            modal(msg, type = 'alert', btnConfirm = 'OK', btnCancel = 'Cancel') {
                return new Promise((resolve) => {
                    const overlay = document.createElement('div');
                    overlay.style.cssText = "position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:1000;";
                    const box = document.createElement('div');
                    box.style.cssText = "background:var(--bg);padding:16px;border:2px solid var(--border);max-width:400px;width:90%;font-family:var(--font);color:var(--ink);text-align:center;";
                    const text = document.createElement('div');
                    text.innerText = msg;
                    text.style.cssText = "margin-bottom:16px;white-space:pre-wrap;line-height:1.4;font-size:13px;";
                    const actions = document.createElement('div');
                    actions.style.cssText = "display:flex;gap:8px;justify-content:center;";
                    const btn1 = document.createElement('button');
                    btn1.innerText = btnConfirm;
                    btn1.style.cssText = "padding:4px 12px;border:2px solid var(--border);cursor:pointer;background:var(--ink);color:var(--bg);font-weight:bold;font-family:var(--font);font-size:12px;";
                    btn1.onclick = () => { overlay.remove(); resolve(true); };
                    if (type === 'confirm') {
                        const btn2 = document.createElement('button');
                        btn2.innerText = btnCancel;
                        btn2.style.cssText = "padding:4px 12px;border:2px solid var(--border);cursor:pointer;background:var(--bg);color:var(--ink);font-weight:bold;font-family:var(--font);font-size:12px;";
                        btn2.onclick = () => { overlay.remove(); resolve(false); };
                        actions.appendChild(btn2);
                    }
                    actions.appendChild(btn1);
                    box.appendChild(text);
                    box.appendChild(actions);
                    overlay.appendChild(box);
                    document.body.appendChild(overlay);
                });
            },

            notify(msg) {
                const t = this.ui.toast;
                clearTimeout(this.toastTid);
                t.innerText = msg;
                t.classList.add('active');
                this.toastTid = setTimeout(() => t.classList.remove('active'), 2500);
            },

            showTree() {
                const overlay = document.createElement('div');
                overlay.style.cssText = "position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:1000;";
                const box = document.createElement('div');
                box.style.cssText = "background:var(--bg);padding:16px;border:2px solid var(--border);max-width:400px;width:90%;font-family:var(--font);color:var(--ink);max-height:80vh;overflow-y:auto;display:flex;flex-direction:column;gap:4px;";
                const title = document.createElement('div');
                title.innerText = "FOLDERS";
                title.style.cssText = "font-weight:bold;font-size:12px;text-transform:uppercase;color:var(--meta);margin-bottom:8px;text-align:center;";
                box.appendChild(title);
                const sortedFolders = Array.from(this.foldersIndex).sort();
                sortedFolders.forEach(folder => {
                    const btn = document.createElement('button');
                    btn.innerText = folder;
                    const isCurrent = folder === this.currentFolder;
                    btn.style.cssText = `text-align:left;padding:4px 8px;border:1px solid ${isCurrent ? 'var(--accent)' : 'var(--border)'};cursor:pointer;background:${isCurrent ? 'var(--accent-dim)' : 'var(--bg)'};color:${isCurrent ? 'var(--accent)' : 'var(--ink)'};font-family:var(--font);font-size:13px;`;
                    btn.onclick = () => {
                        overlay.remove();
                        if (!isCurrent) {
                            this.currentFolder = folder;
                            this.ui.folderLabel.innerText = folder;
                            this.ui.folderLabel.title = `Current Folder: ${folder}`;
                            this.requestRender({});
                            this.notify(`Directory: ${folder}`);
                        }
                    };
                    box.appendChild(btn);
                });
                const closeBtn = document.createElement('button');
                closeBtn.innerText = "Close";
                closeBtn.style.cssText = "margin-top:8px;padding:4px 12px;border:2px solid var(--border);cursor:pointer;background:var(--ink);color:var(--bg);font-weight:bold;font-family:var(--font);font-size:12px;";
                closeBtn.onclick = () => overlay.remove();
                box.appendChild(closeBtn);
                overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
                overlay.appendChild(box);
                document.body.appendChild(overlay);
            }
        };

        sys.init();
    </script>
</body>

</html>
